<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>幸福+工場・配送調度系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --bg: #f9f6f2; --primary: #2c2416; --accent: #c9a96e; --accent-dark: #a68a55; --text: #3d352a; --border: #e3ddd3; --orange: #d4622a; --green: #2d8a54; }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 240px; }
  .header { background: var(--primary); padding: 30px 20px; text-align: center; color: #fff; border-bottom: 6px solid var(--accent); }
  .header h1 { font-family: 'Noto Serif TC', serif; font-size: 26px; margin: 0; }
  .wrapper { max-width: 800px; margin: 0 auto; padding: 0 15px; }
  .section-title { font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 700; color: var(--accent-dark); margin: 25px 0 12px; display: flex; align-items: center; gap: 10px; }
  .main-card { background: #fff; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border: 1px solid var(--border); margin-bottom: 20px; padding: 20px; }
  .prod-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 10px; background: #fdfbf8; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
  .date-group { background: #fff; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 30px; }
  .date-head { background: #fcfaf7; padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; border-radius: 15px 15px 0 0; }
  .place-card { margin: 15px; padding: 15px; background: #fff; border: 1px solid var(--border); border-radius: 10px; border-left: 5px solid var(--accent); }
  input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; margin-bottom: 8px; }
  .qty-field { width: 85px !important; text-align: center; font-weight: 700; border: 2px solid var(--accent) !important; margin-bottom: 0; }
  .btn-ghost { background: transparent; border: 2px dashed var(--accent); color: var(--accent-dark); padding: 12px; width: 100%; border-radius: 10px; font-weight: 700; cursor: pointer; }
  .footer-summary { background: var(--primary); padding: 20px; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; border-top: 4px solid var(--accent); }
  .status-pills { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 15px; }
  .pill { padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 700; color: #fff; }
  .pill-ok { background: var(--green); }
  .pill-wait { background: var(--orange); }
  .btn-primary { width: 100%; max-width: 400px; padding: 18px; background: var(--accent); color: #fff; border: none; border-radius: 50px; font-size: 18px; font-weight: 700; cursor: pointer; display: block; margin: 0 auto; }
  .btn-primary:disabled { background: #555; opacity: 0.7; }
</style>
</head>
<body>

<header class="header"><h1>幸福+工場配送安排單</h1></header>

<div class="wrapper">
  <div class="section-title"><i>1</i> 訂單總量與訂購人</div>
  <div class="main-card">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:10px;">
      <div><label style="font-size:12px;">訂購人姓名 *</label><input type="text" id="cust-name" oninput="updateSummary()"></div>
      <div><label style="font-size:12px;">訂購人電話</label><input type="tel" id="cust-phone"></div>
    </div>
    <div id="main-prod-list"></div>
    <button class="btn-ghost" onclick="addMainProd()">＋ 新增訂購品項</button>
  </div>

  <div class="section-title"><i>2</i> 配送計畫</div>
  <div id="date-group-container"></div>
  <button class="btn-ghost" style="background:var(--primary); color:var(--accent); margin-bottom:80px;" onclick="addDateGroup()">＋ 新增出貨日期</button>
</div>

<div class="footer-summary">
  <div class="status-pills" id="summary-pills"></div>
  <button class="btn-primary" id="btn-submit" onclick="submitForm()" disabled>請填寫必要資訊</button>
</div>

<div id="ov-loading" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; color:#fff; align-items:center; justify-content:center;">
  <div style="text-align:center;"><h2>正在同步資料...</h2></div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycby6Qj3UxB2dB0FR8mbWidJ8tWD8XrmXIyPuwUM6TFLZnY-Q393PsdTeD4AiOQK_PoDs/exec';
const PRODUCT_LIST = ["星空不來梅．單層綜果款", "星空不來梅．雙層綜果款", "星空不來梅．單層吃茶款", "星空不來梅．雙層吃茶款", "美好時光．雙層綜合款(餅乾+鳳梨酥+長蛋2)", "美好時光．雙層綜合款(12長蛋餅鳳款)", "美好時光．單層餅乾蛋捲款", "美好時光．單層蛋捲款", "花獻．餅乾款", "花獻．餅乾蛋捲款", "小協奏禮盒．餅乾款", "小協奏禮盒．餅乾蛋捲款", "幸福花磚．綜合款雙層", "幸福花磚．餅乾款雙層", "幸福花磚．綜合款三層", "Happy Together．16支蛋捲餅乾款", "Happy Together．8支蛋捲綜合款", "Happy Together．8入土鳳梨酥", "一起幸福吧．麵包樹聯名", "美好夢想．A餅鳳款", "美好夢想．B綜合款", "美好夢想．C餅蛋款", "美好夢想S．餅乾蛋捲組", "Wonderful World．精采世界", "愛麗絲夢遊仙境．蛋捲組", "愛麗絲夢遊仙境．蛋捲餅乾組", "星空．幸福+蛋捲鐵盒(芝麻)", "星空．幸福+蛋捲鐵盒(咖啡)", "星空．幸福+蛋捲鐵盒(巧克力)", "星空．幸福+蛋捲鐵盒(原味)", "星空．幸福+蛋捲鐵盒(香蕉)", "星空．幸福+蛋捲鐵盒(紅茶)", "星空．幸福+蛋捲鐵盒(抹茶)", "星空．幸福+蛋捲鐵盒(紅藜)", "星空．幸福+蛋捲鐵盒(小農)", "星空．幸福+蛋捲鐵盒(經典)", "蛋捲．家庭分享包", "核你同頻綠．中式漢餅", "自定義"];

let mainProducts = [];
let dateGroups = [];

// 強制正整數
function forceInt(input) { 
  input.value = input.value.replace(/[^0-9]/g, ''); 
}

function addMainProd() {
  mainProducts.push({ id: Date.now(), name: PRODUCT_LIST[0], customName: '', totalQty: '' });
  render();
}

function addDateGroup() {
  const gId = Date.now();
  dateGroups.push({ id: gId, date: '', addresses: [{ id: gId+1, receiver: '', rPhone: '', address: '', items: {} }] });
  render();
}

function render() {
  // 渲染第一階段品項清單
  document.getElementById('main-prod-list').innerHTML = mainProducts.map(p => `
    <div class="prod-row">
      <select style="flex:1;" onchange="let x=mainProducts.find(m=>m.id===${p.id}); x.name=this.value; render();">
        ${PRODUCT_LIST.map(opt => `<option value="${opt}" ${p.name===opt?'selected':''}>${opt}</option>`).join('')}
      </select>
      <input type="number" class="qty-field" placeholder="總盒數" value="${p.totalQty}" oninput="forceInt(this); let x=mainProducts.find(m=>m.id===${p.id}); x.totalQty=this.value; updateSummary();">
      <button onclick="mainProducts=mainProducts.filter(x=>x.id!==${p.id}); render();" style="border:none;background:none;color:red;padding:5px;cursor:pointer;">✕</button>
      ${p.name==='自定義'?`<input type="text" placeholder="輸入自定義品項名稱" style="width:100%;margin-top:5px;" value="${p.customName}" oninput="let x=mainProducts.find(m=>m.id===${p.id}); x.customName=this.value; updateSummary();">`:''}
    </div>
  `).join('');

  // 渲染第二階段配送計畫
  document.getElementById('date-group-container').innerHTML = dateGroups.map(g => `
    <div class="date-group">
      <div class="date-head">
        <input type="date" value="${g.date}" onchange="g.date=this.value; updateSummary();" style="width:160px;margin-bottom:0;">
        <button onclick="dateGroups=dateGroups.filter(x=>x.id!==${g.id}); render();" style="border:none;background:none;color:red;cursor:pointer;">移除此日</button>
      </div>
      ${g.addresses.map((a, idx) => `
        <div class="place-card">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;"><b>地點 ${idx+1}</b><button onclick="let targetG=dateGroups.find(x=>x.id===${g.id}); targetG.addresses=targetG.addresses.filter(x=>x.id!==${a.id}); render();" style="border:none;background:none;color:red;font-size:12px;cursor:pointer;">移除地址</button></div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <input type="text" placeholder="收件人姓名" value="${a.receiver}" oninput="a.receiver=this.value; updateSummary();">
            <input type="tel" placeholder="收件人電話" value="${a.rPhone}" oninput="a.rPhone=this.value; updateSummary();">
          </div>
          <input type="text" placeholder="配送地址" value="${a.address}" oninput="a.address=this.value; updateSummary();">
          <div style="margin-top:10px; border-top:1px solid #eee; padding-top:10px;">
            <p style="font-size:12px; color:var(--text-light); margin:0 0 10px 0;">在此地點分配數量：</p>
            ${mainProducts.map(p => `
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
                <span style="font-size:13px;">${p.name==='自定義'?(p.customName||'未命名'):p.name}</span>
                <input type="number" class="qty-field" placeholder="0" value="${a.items[p.id]||''}" oninput="forceInt(this); a.items[${p.id}]=this.value; updateSummary();">
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
      <div style="padding:10px;"><button class="btn-ghost" onclick="dateGroups.find(x=>x.id===${g.id}).addresses.push({id:Date.now(),receiver:'',rPhone:'',address:'',items:{}}); render();">＋ 在此日新增配送地點</button></div>
    </div>
  `).join('');
  updateSummary();
}

function updateSummary() {
  const btn = document.getElementById('btn-submit');
  const pills = document.getElementById('summary-pills');
  let allMatched = true;

  // 1. 檢查盒數分配狀況
  pills.innerHTML = mainProducts.map(p => {
    let target = parseInt(p.totalQty) || 0;
    let current = 0;
    dateGroups.forEach(g => g.addresses.forEach(a => {
      current += parseInt(a.items[p.id]) || 0;
    }));
    const pName = p.name==='自定義' ? (p.customName || '自定義') : p.name;
    const ok = (target > 0 && target === current);
    if (!ok) allMatched = false;
    return `<span class="pill ${ok ? 'pill-ok' : 'pill-wait'}">${pName}: ${current}/${target}</span>`;
  }).join('');

  // 2. 檢查基本欄位是否完整
  const nameOk = document.getElementById('cust-name').value.trim() !== "";
  const dateOk = dateGroups.length > 0 && dateGroups.every(g => g.date !== "");
  const addrOk = dateGroups.every(g => g.addresses.every(a => a.receiver.trim() !== "" && a.address.trim() !== ""));

  // 3. 判斷按鈕狀態
  if (nameOk && dateOk && addrOk) {
    btn.disabled = false;
    if (allMatched) {
      btn.innerText = "確認送出配送安排單";
      btn.style.background = "var(--green)";
    } else {
      btn.innerText = "盒數尚未對齊，仍要送出？";
      btn.style.background = "var(--orange)";
    }
  } else {
    btn.disabled = true;
    btn.innerText = "請填寫姓名、日期與收件資訊";
    btn.style.background = "#555";
  }
}

async function submitForm() {
  const btn = document.getElementById('btn-submit');
  if (btn.innerText.includes("尚未對齊")) {
    if (!confirm("⚠️ 注意：目前分配的盒數與總盒數不符，確定要送出嗎？")) return;
  }

  document.getElementById('ov-loading').style.display = 'flex';
  
  const payload = {
    customer: document.getElementById('cust-name').value,
    phone: document.getElementById('cust-phone').value || "未填",
    dateGroups: dateGroups.map(g => ({
      date: g.date,
      addresses: g.addresses.map(a => {
        let items = [];
        mainProducts.forEach(p => {
          if (a.items[p.id] && a.items[p.id] !== '0') {
            items.push({ name: p.name==='自定義' ? p.customName : p.name, qty: a.items[p.id] });
          }
        });
        return { receiver: a.receiver, phone: a.rPhone, address: a.address, items: items };
      })
    }))
  };

  try {
    // 預設送往您的 Google Apps Script
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    setTimeout(() => {
      document.getElementById('ov-loading').innerHTML = `
        <div style="background:#fff;padding:40px;border-radius:20px;text-align:center;color:#2c2416;max-width:300px;">
          <h1 style="color:var(--green)">發送成功</h1>
          <p>配送單已成功同步至系統。</p>
          <button onclick="location.reload()" style="padding:10px 30px;background:var(--primary);color:#fff;border-radius:50px;border:none;cursor:pointer;">返回</button>
        </div>`;
    }, 1000);
  } catch(e) {
    alert("發送失敗，請檢查網路連線或聯繫管理員。");
    document.getElementById('ov-loading').style.display = 'none';
  }
}

// 初始化一個品項
addMainProd();
</script>
</body>
</html>
