<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幸福+工場・配送安排單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
/* 保持您最滿意的 index(4) 風格 */
:root { --cream: #faf6f0; --warm: #fff9f2; --gold: #c9a96e; --gold-dark: #9e7a45; --ink: #2c2416; --border: #e5d8c5; --orange: #d4622a; --sans: 'Noto Sans TC', sans-serif; --serif: 'Noto Serif TC', serif; }
body { font-family: var(--sans); background: var(--cream); color: var(--ink); line-height: 1.6; margin: 0; padding-bottom: 100px; }
.header { background: var(--ink); padding: 40px 24px; text-align: center; color: #fff8ee; border-bottom: 3px solid var(--gold); }
.header-badge { display: inline-block; font-family: var(--serif); font-size: 11px; letter-spacing: 4px; color: var(--gold); border: 1px solid rgba(201,169,110,0.3); padding: 4px 16px; margin-bottom: 10px; }
.container { max-width: 860px; margin: 0 auto; padding: 20px; }
.card { background: var(--warm); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
.card-head { background: var(--ink); padding: 12px 20px; display: flex; align-items: center; gap: 10px; color: #fff8ee; }
.card-head-num { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--gold); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 11px; }
.card-body { padding: 20px; }
.field { margin-bottom: 15px; display: flex; flex-direction: column; }
.field label { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #6b5840; }
.field input, .field select, .field textarea { padding: 10px; border: 1px solid var(--border); border-radius: 2px; font-size: 14px; }
.prod-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
.prod-table th { text-align: left; font-size: 12px; color: #a8927a; padding: 10px; border-bottom: 1px solid var(--border); }
.prod-table td { padding: 10px; border-bottom: 1px solid var(--border); }
.summary-bar { background: var(--ink); color: var(--gold); padding: 15px; border-radius: 4px; display: flex; justify-content: space-around; font-weight: bold; margin: 20px 0; border: 1px solid var(--gold); }
.btn-add { background: none; border: 1px dashed var(--gold); color: var(--gold-dark); padding: 10px; width: 100%; cursor: pointer; border-radius: 4px; font-weight: bold; }
.btn-submit { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: white; border: none; font-size: 18px; cursor: pointer; font-weight: bold; letter-spacing: 4px; border-radius: 4px; }
.btn-submit:disabled { background: #ccc; cursor: not-allowed; opacity: 0.6; }
.del-card { background: #fff; border: 1px solid var(--border); padding: 15px; margin-bottom: 15px; border-radius: 4px; }
.qty-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px dashed #eee; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); color: white; align-items: center; justify-content: center; z-index: 1000; }
.overlay.show { display: flex; }
.overlay-box { background: white; color: black; padding: 40px; border-radius: 8px; text-align: center; }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">心路基金會・幸福+工場</div>
  <h1 style="font-family: var(--serif); margin:0;">禮盒<em>配送安排單</em></h1>
</div>

<main class="container">
  <div class="card">
    <div class="card-head"><div class="card-head-num">一</div><h2 style="font-size:14px; margin:0; letter-spacing:2px;">訂購人基本資料</h2></div>
    <div class="card-body">
      <div class="field"><label>訂購人姓名 *</label><input type="text" id="cust-name" oninput="updateSummary()"></div>
      <div class="field"><label>聯絡電話 *</label><input type="tel" id="cust-phone"></div>
      <div class="field"><label>備註說明</label><textarea id="cust-note" rows="2"></textarea></div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><div class="card-head-num">二</div><h2 style="font-size:14px; margin:0; letter-spacing:2px;">已訂購品項與總數量</h2></div>
    <div class="card-body">
      <table class="prod-table">
        <thead><tr><th>品項名稱</th><th style="width:100px;">總盒數</th><th style="width:100px;">已分配</th><th></th></tr></thead>
        <tbody id="prod-body"></tbody>
      </table>
      <button class="btn-add" onclick="addProd()">＋ 新增禮盒品項</button>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><div class="card-head-num">三</div><h2 style="font-size:14px; margin:0; letter-spacing:2px;">配送點安排</h2></div>
    <div class="card-body">
      <div id="delivery-list"></div>
      <button class="btn-add" onclick="addDel()">＋ 新增配送點</button>
    </div>
  </div>

  <div class="summary-bar" id="summary"></div>
  <button class="btn-submit" id="btn-submit" onclick="submitForm()" disabled>確認送出配送安排單</button>
</main>

<div class="overlay" id="ov-loading"><div class="overlay-box"><h2>傳送中...</h2><p>正在處理您的配送資料</p></div></div>
<div class="overlay" id="ov-success"><div class="overlay-box"><h2>✓ 送出成功</h2><p>業務人員已收到您的配送安排。</p><button onclick="location.reload()" style="margin-top:20px; padding:8px 20px;">重新填寫</button></div></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycby6Qj3UxB2dB0FR8mbWidJ8tWD8XrmXIyPuwUM6TFLZnY-Q393PsdTeD4AiOQK_PoDs/exec';

// 從您的截圖整合的品項清單
const PRODUCT_LIST = [
  "星空不來梅．單層綜果款", "星空不來梅．雙層綜果款", "星空不來梅．單層吃茶款", "星空不來梅．雙層吃茶款",
  "美好時光．雙層綜合款(餅乾+鳳梨酥+長蛋2)", "美好時光．雙層綜合款(12長蛋餅鳳款)", "美好時光．單層餅乾蛋捲款", "美好時光．單層蛋捲款",
  "花獻．餅乾款", "花獻．餅乾蛋捲款", "小協奏禮盒．餅乾款", "小協奏禮盒．餅乾蛋捲款",
  "幸福花磚．綜合款雙層", "幸福花磚．餅乾款雙層", "幸福花磚．綜合款三層",
  "Happy Together．16支蛋捲餅乾款", "Happy Together．8支蛋捲綜合款", "Happy Together．8入土鳳梨酥",
  "一起幸福吧．麵包樹聯名", "美好夢想．A餅鳳款", "美好夢想．B綜合款", "美好夢想．C餅蛋款", "美好夢想S．餅乾蛋捲組",
  "Wonderful World．精采世界", "愛麗絲夢遊仙境．蛋捲組", "愛麗絲夢遊仙境．蛋捲餅乾組",
  "星空．幸福+蛋捲鐵盒(芝麻)", "星空．幸福+蛋捲鐵盒(咖啡)", "星空．幸福+蛋捲鐵盒(巧克力)", "星空．幸福+蛋捲鐵盒(原味)",
  "星空．幸福+蛋捲鐵盒(香蕉)", "星空．幸福+蛋捲鐵盒(紅茶)", "星空．幸福+蛋捲鐵盒(抹茶)", "星空．幸福+蛋捲鐵盒(紅藜)",
  "星空．幸福+蛋捲鐵盒(小農)", "星空．幸福+蛋捲鐵盒(經典)", "蛋捲．家庭分享包", "核你同頻綠．中式漢餅", "自定義"
];

let products = [];
let deliveries = [];

function addProd() {
  products.push({ id: Date.now(), name: PRODUCT_LIST[0], customName: '', total: 0 });
  render();
}

function addDel() {
  deliveries.push({ id: Date.now(), name: '', phone: '', date: '', address: '', items: {} });
  render();
}

function render() {
  // 渲染品項
  const pBody = document.getElementById('prod-body');
  pBody.innerHTML = products.map(p => {
    const allocated = deliveries.reduce((sum, d) => sum + (d.items[p.id] || 0), 0);
    return `
      <tr>
        <td>
          <select onchange="updateP(${p.id},'name',this.value)" style="width:100%">
            ${PRODUCT_LIST.map(opt => `<option value="${opt}" ${p.name===opt?'selected':''}>${opt}</option>`).join('')}
          </select>
          ${p.name==='自定義' ? `<input type="text" placeholder="輸入名稱" oninput="updateP(${p.id},'customName',this.value)" value="${p.customName}" style="margin-top:5px;width:90%">` : ''}
        </td>
        <td><input type="number" value="${p.total||''}" oninput="updateP(${p.id},'total',+this.value)" style="width:70px"></td>
        <td style="font-size:12px; color:${allocated > p.total ? 'red' : 'green'}">${allocated} / ${p.total}</td>
        <td><button onclick="removeP(${p.id})" style="border:none;color:red;background:none;cursor:pointer;">✕</button></td>
      </tr>
    `;
  }).join('');

  // 渲染配送
  const dList = document.getElementById('delivery-list');
  dList.innerHTML = deliveries.map((d, idx) => `
    <div class="del-card">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px;border-bottom:1px solid #eee;padding-bottom:5px;">
        <strong>📍 配送點 ${idx+1}</strong>
        <button onclick="removeD(${d.id})" style="color:red;border:none;background:none;cursor:pointer;">移除</button>
      </div>
      <div class="field"><label>收件姓名 *</label><input type="text" oninput="updateD(${d.id},'name',this.value)" value="${d.name}"></div>
      <div class="field"><label>地址 *</label><input type="text" oninput="updateD(${d.id},'address',this.value)" value="${d.address}"></div>
      <div class="field"><label>配送日期 *</label><input type="date" oninput="updateD(${d.id},'date',this.value)" value="${d.date}"></div>
      <div style="background:#f9f4ec;padding:10px;">
        <div style="font-size:11px;font-weight:bold;margin-bottom:5px;">數量分配：</div>
        ${products.map(p => `
          <div class="qty-row">
            <span style="flex:1;font-size:13px;">${p.name==='自定義'?(p.customName||'未命名'):p.name}</span>
            <input type="number" style="width:60px" oninput="updateDI(${d.id},${p.id},+this.value)" value="${d.items[p.id]||''}">
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
  updateSummary();
}

function updateP(id,f,v){ products.find(x=>x.id===id)[f]=v; render(); }
function removeP(id){ products = products.filter(x=>x.id!==id); render(); }
function updateD(id,f,v){ deliveries.find(x=>x.id===id)[f]=v; updateSummary(); }
function removeD(id){ deliveries = deliveries.filter(x=>x.id!==id); render(); }
function updateDI(did, pid, v) { deliveries.find(x=>x.id===did).items[pid] = v; updateSummary(); }

function updateSummary() {
  const total = products.reduce((s,p)=>s+p.total,0);
  let allocated = 0;
  deliveries.forEach(d => Object.values(d.items).forEach(v => allocated += (v||0)));
  const diff = total - allocated;

  document.getElementById('summary').innerHTML = `
    <div>總盒數: ${total}</div> <div>已分配: ${allocated}</div> <div style="color:${diff===0?'white':'#f66'}">待分配: ${diff}</div>
  `;

  const nameFilled = document.getElementById('cust-name').value.trim() !== '';
  const delAllFilled = deliveries.every(d => d.name && d.address && d.date);
  
  // 只有在總數 > 0、分配完畢且基本資料填完時才開放送出
  document.getElementById('btn-submit').disabled = !(total > 0 && diff === 0 && nameFilled && delAllFilled);
}

async function submitForm() {
  document.getElementById('ov-loading').classList.add('show');
  const payload = {
    customerName: document.getElementById('cust-name').value,
    customerPhone: document.getElementById('cust-phone').value,
    note: document.getElementById('cust-note').value,
    products: products.map(p => ({ name: p.name==='自定義'?p.customName:p.name, total: p.total })),
    deliveries: deliveries.map(d => ({
      name: d.name, address: d.address, date: d.date,
      items: Object.keys(d.items).map(pid => ({
        productName: (products.find(p=>p.id==pid)?.name === '自定義' ? products.find(p=>p.id==pid)?.customName : products.find(p=>p.id==pid)?.name),
        qty: d.items[pid]
      })).filter(i => i.qty > 0)
    })),
    submittedAt: new Date().toLocaleString()
  };

  try {
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    document.getElementById('ov-loading').classList.remove('show');
    document.getElementById('ov-success').classList.add('show');
  } catch (e) {
    alert('連線失敗');
    document.getElementById('ov-loading').classList.remove('show');
  }
}

addProd(); // 初始化一行
</script>
</body>
</html>
