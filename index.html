<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>幸福+工場・配送安排系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0; --warm: #fff9f2; --gold: #c9a96e; --gold-dark: #a68a55;
    --ink: #2c2416; --ink-mid: #5d4e37; --border: #e8ded0; --orange: #d4622a;
    --success: #2d8a54; --error: #d4622a;
  }
  
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--cream); color: var(--ink); line-height: 1.6; margin: 0; padding-bottom: 220px; }

  /* 標頭優化 */
  .header { background: var(--ink); padding: 50px 20px; text-align: center; color: #fff8ee; border-bottom: 6px solid var(--gold); box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .header-badge { display: inline-block; font-family: 'Noto Serif TC', serif; font-size: 13px; letter-spacing: 4px; color: var(--gold); border: 1px solid rgba(201,169,110,0.4); padding: 6px 20px; margin-bottom: 15px; border-radius: 2px; }
  .header h1 { font-family: 'Noto Serif TC', serif; font-size: 28px; margin: 0; letter-spacing: 3px; font-weight: 700; }
  .header h1 em { font-style: normal; color: var(--gold); margin-left: 10px; font-weight: 500; }

  .container { max-width: 850px; margin: 0 auto; padding: 20px 15px; }

  /* 區塊標題 */
  .section-label { font-family: 'Noto Serif TC', serif; color: var(--gold-dark); font-weight: 700; margin: 40px 0 20px; display: flex; align-items: center; gap: 15px; font-size: 20px; }
  .section-label::after { content: ""; flex: 1; height: 1.5px; background: linear-gradient(to right, var(--border), transparent); }

  /* 卡片設計 */
  .card { background: var(--warm); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 25px; box-shadow: 0 8px 25px rgba(44,36,22,0.04); transition: transform 0.3s ease; }
  .card-body { padding: 25px; }

  /* 日期大區塊 */
  .date-block { background: #fff; border: 1px solid var(--border); border-radius: 16px; margin-bottom: 35px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border-top: 5px solid var(--gold); }
  .date-block-header { background: #fdfaf5; padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  
  /* 地址小卡 */
  .addr-card { background: var(--warm); border: 1px solid #f2e9dc; border-radius: 12px; padding: 20px; margin: 20px; position: relative; }
  .addr-card::before { content: ""; position: absolute; left: 0; top: 20px; bottom: 20px; width: 4px; background: var(--gold); border-radius: 0 4px 4px 0; }

  /* 輸入控制 */
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--ink-mid); }
  .field input, .field select, .field textarea { 
    width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; background: #fff; transition: all 0.2s; 
  }
  .field input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 0 4px rgba(201,169,110,0.12); }

  .qty-input { width: 100px !important; text-align: center; font-weight: 700; border: 2px solid var(--gold) !important; color: var(--ink); font-size: 20px !important; height: 50px; border-radius: 10px; background: #fff; }

  /* 按鈕樣式 */
  .btn-add { background: #fff; border: 2px dashed var(--gold); color: var(--gold-dark); padding: 16px; width: 100%; cursor: pointer; border-radius: 10px; font-weight: 700; font-size: 15px; margin-top: 10px; transition: 0.3s; }
  .btn-add:hover { background: var(--warm); border-style: solid; }
  .btn-remove { color: var(--orange); background: none; border: none; font-size: 13px; font-weight: 700; cursor: pointer; padding: 5px 10px; border-radius: 4px; transition: 0.2s; }
  .btn-remove:hover { background: rgba(212, 98, 42, 0.1); }

  /* 底部統計與送出 */
  .summary-bar { background: var(--ink); color: #fff; padding: 25px 20px; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 100; border-top: 4px solid var(--gold); box-shadow: 0 -10px 30px rgba(0,0,0,0.25); }
  .summary-tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; max-width: 900px; margin-left: auto; margin-right: auto; }
  .tag { font-size: 12px; padding: 5px 12px; border-radius: 30px; font-weight: 700; border: 1px solid transparent; letter-spacing: 0.5px; }
  .tag-fail { background: rgba(212, 98, 42, 0.15); color: #ffab8d; border-color: var(--orange); }
  .tag-pass { background: rgba(74, 222, 128, 0.15); color: #4ade80; border-color: #4ade80; }

  .btn-submit { 
    width: 100%; max-width: 450px; padding: 20px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); 
    color: #fff; border: none; border-radius: 50px; font-size: 18px; font-weight: 700; cursor: pointer; display: block; 
    margin: 0 auto; letter-spacing: 4px; box-shadow: 0 5px 15px rgba(166,138,85,0.3); transition: 0.3s;
  }
  .btn-submit:active { transform: scale(0.98); }
  .btn-submit:disabled { background: #444; color: #777; cursor: not-allowed; box-shadow: none; }

  /* 響應式優化 */
  @media (min-width: 768px) {
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .header h1 { font-size: 36px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-badge">心路基金會・幸福+工場</div>
  <h1>禮盒<em>配送安排系統</em></h1>
</header>

<main class="container">
  <div class="section-label">1. 訂單總量與訂購人</div>
  <section class="card">
    <div class="card-body">
      <div class="field-grid">
        <div class="field"><label>訂購人姓名 *</label><input type="text" id="cust-name" oninput="updateSummary()" placeholder="您的姓名"></div>
        <div class="field"><label>聯絡電話 *</label><input type="tel" id="cust-phone" placeholder="您的電話"></div>
      </div>
      
      <div style="margin-top:20px; padding:20px; background:#fff; border:1px solid var(--border); border-radius:12px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);">
        <label style="font-weight:700; color:var(--ink); display:block; margin-bottom:15px; font-size:16px;">設定訂購品項與總盒數：</label>
        <div id="main-prod-list"></div>
        <button class="btn-add" onclick="addMainProd()">＋ 新增訂購品項</button>
      </div>
    </div>
  </section>

  <div class="section-label">2. 分日期與分點配送規劃</div>
  <div id="date-group-container"></div>
  
  <button class="btn-add" style="background:var(--ink); color:var(--gold); border-style:solid; padding:20px; font-size:17px; margin-bottom:50px;" onclick="addDateGroup()">
    ＋ 新增出貨日期 (A日期、B日期...)
  </button>
</main>

<div class="summary-bar">
  <div class="summary-tags" id="summary-tags-container"></div>
  <button class="btn-submit" id="btn-submit" onclick="submitForm()" disabled>請完成盒數分配</button>
</div>

<div id="ov-loading" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; color:#fff; align-items:center; justify-content:center; flex-direction:column;">
  <div id="loading-box" style="text-align:center;">
    <h2 style="font-family:'Noto Serif TC',serif; letter-spacing:2px;">正在傳送資料...</h2>
    <p style="opacity:0.7;">請勿關閉視窗</p>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycby6Qj3UxB2dB0FR8mbWidJ8tWD8XrmXIyPuwUM6TFLZnY-Q393PsdTeD4AiOQK_PoDs/exec';
const PRODUCT_LIST = ["星空不來梅．單層綜果款", "星空不來梅．雙層綜果款", "星空不來梅．單層吃茶款", "星空不來梅．雙層吃茶款", "美好時光．雙層綜合款(餅乾+鳳梨酥+長蛋2)", "美好時光．雙層綜合款(12長蛋餅鳳款)", "美好時光．單層餅乾蛋捲款", "美好時光．單層蛋捲款", "花獻．餅乾款", "花獻．餅乾蛋捲款", "小協奏禮盒．餅乾款", "小協奏禮盒．餅乾蛋捲款", "幸福花磚．綜合款雙層", "幸福花磚．餅乾款雙層", "幸福花磚．綜合款三層", "Happy Together．16支蛋捲餅乾款", "Happy Together．8支蛋捲綜合款", "Happy Together．8入土鳳梨酥", "一起幸福吧．麵包樹聯名", "美好夢想．A餅鳳款", "美好夢想．B綜合款", "美好夢想．C餅蛋款", "美好夢想S．餅乾蛋捲組", "Wonderful World．精采世界", "愛麗絲夢遊仙境．蛋捲組", "愛麗絲夢遊仙境．蛋捲餅乾組", "星空．幸福+蛋捲鐵盒(芝麻)", "星空．幸福+蛋捲鐵盒(咖啡)", "星空．幸福+蛋捲鐵盒(巧克力)", "星空．幸福+蛋捲鐵盒(原味)", "星空．幸福+蛋捲鐵盒(香蕉)", "星空．幸福+蛋捲鐵盒(紅茶)", "星空．幸福+蛋捲鐵盒(抹茶)", "星空．幸福+蛋捲鐵盒(紅藜)", "星空．幸福+蛋捲鐵盒(小農)", "星空．幸福+蛋捲鐵盒(經典)", "蛋捲．家庭分享包", "核你同頻綠．中式漢餅", "自定義"];

let mainProducts = [];
let dateGroups = [];

function addMainProd() {
  mainProducts.push({ id: Date.now(), name: PRODUCT_LIST[0], customName: '', totalQty: '' });
  render();
}

function updateMainProd(id, f, v) {
  let p = mainProducts.find(x => x.id === id);
  p[f] = v;
  if(f === 'name') render(); else updateSummary();
}

function addDateGroup() {
  const gId = Date.now();
  dateGroups.push({ id: gId, date: '', addresses: [{ id: gId+1, receiver: '', address: '', items: {} }] });
  render();
}

function updateDelDate(gId, val) {
  const d = new Date(val);
  if (d.getDay() === 0 || d.getDay() === 6) {
    alert("週六、日工場休假不配送，請選擇平日日期。");
    return;
  }
  dateGroups.find(g => g.id === gId).date = val;
  updateSummary();
}

function render() {
  // 渲染總量區
  const mList = document.getElementById('main-prod-list');
  mList.innerHTML = mainProducts.map(p => `
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
      <select onchange="updateMainProd(${p.id},'name',this.value)" style="flex:1;">
        ${PRODUCT_LIST.map(opt => `<option value="${opt}" ${p.name===opt?'selected':''}>${opt}</option>`).join('')}
      </select>
      <input type="number" inputmode="numeric" class="qty-input" placeholder="總盒數" value="${p.totalQty}" oninput="updateMainProd(${p.id},'totalQty',this.value)">
      <button class="btn-remove" onclick="mainProducts=mainProducts.filter(x=>x.id!==${p.id});render();">✕</button>
    </div>
    ${p.name==='自定義'?`<input type="text" placeholder="輸入自定義品名" style="margin-bottom:15px;" value="${p.customName}" oninput="updateMainProd(${p.id},'customName',this.value)">`:''}
  `).join('');

  // 渲染日期與地址區
  const gContainer = document.getElementById('date-group-container');
  gContainer.innerHTML = dateGroups.map(g => `
    <div class="date-block">
      <div class="date-block-header">
        <div style="display:flex; align-items:center; gap:15px;">
          <span style="font-weight:700; color:var(--ink);">出貨日期</span>
          <input type="date" value="${g.date}" onchange="updateDelDate(${g.id}, this.value)" style="width:170px; border:1px solid #ddd; padding:8px; border-radius:6px;">
        </div>
        <button class="btn-remove" style="color:#d4622a" onclick="dateGroups=dateGroups.filter(x=>x.id!==${g.id});render();">移除此日期區塊</button>
      </div>
      
      ${g.addresses.map((a, idx) => `
        <div class="addr-card">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <span style="font-size:15px; font-weight:700; color:var(--gold-dark);">📍 配送地點 ${idx+1}</span>
            <button class="btn-remove" onclick="removeAddr(${g.id}, ${a.id})">✕ 移除地址</button>
          </div>
          <div class="field-grid">
            <div class="field"><label>收件人姓名</label><input type="text" placeholder="姓名" value="${a.receiver}" oninput="updateAddrVal(${g.id},${a.id},'receiver',this.value)"></div>
            <div class="field"><label>完整收件地址</label><input type="text" placeholder="完整地址" value="${a.address}" oninput="updateAddrVal(${g.id},${a.id},'address',this.value)"></div>
          </div>
          
          <div style="background:#fff; padding:15px; border-radius:10px; border:1px solid #f0e6d2;">
            <div style="font-size:13px; font-weight:700; color:var(--ink-mid); margin-bottom:10px;">本點配送數量：</div>
            ${mainProducts.map(p => {
              const pLabel = p.name==='自定義' ? (p.customName||'自定義品項') : p.name;
              return `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px dashed #eee;">
                  <span style="font-size:14px; font-weight:500;">${pLabel}</span>
                  <input type="number" inputmode="numeric" class="qty-input" style="height:40px; width:80px!important; font-size:16px!important;" placeholder="0" 
                         value="${a.items[p.id]||''}" oninput="updateItemQty(${g.id},${a.id},${p.id},this.value)">
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `).join('')}
      
      <div style="padding:0 20px 20px;">
        <button class="btn-add" onclick="addAddr(${g.id})">＋ 在此日期新增地址</button>
      </div>
    </div>
  `).join('');
  updateSummary();
}

function removeAddr(gId, aId) {
  const g = dateGroups.find(x => x.id === gId);
  g.addresses = g.addresses.filter(a => a.id !== aId);
  render();
}

function addAddr(gId) {
  dateGroups.find(g => g.id === gId).addresses.push({ id: Date.now(), receiver: '', address: '', items: {} });
  render();
}

function updateAddrVal(gId, aId, f, v) {
  dateGroups.find(g => g.id === gId).addresses.find(a => a.id === aId)[f] = v;
  updateSummary();
}

function updateItemQty(gId, aId, pId, v) {
  dateGroups.find(g => g.id === gId).addresses.find(a => a.id === aId).items[pId] = v;
  updateSummary();
}

function updateSummary() {
  const container = document.getElementById('summary-tags-container');
  let allMatched = true;
  let html = '';

  if(mainProducts.length === 0) allMatched = false;

  mainProducts.forEach(p => {
    const pLabel = p.name==='自定義' ? (p.customName||'未命名') : p.name;
    const target = Number(p.totalQty) || 0;
    let current = 0;
    
    dateGroups.forEach(g => {
      g.addresses.forEach(a => {
        current += (Number(a.items[p.id]) || 0);
      });
    });

    const isMatch = (target > 0 && target === current);
    if(!isMatch) allMatched = false;
    
    html += `<span class="tag ${isMatch?'tag-pass':'tag-fail'}">${pLabel}: ${current}/${target}</span>`;
  });

  container.innerHTML = html;

  const nameOk = document.getElementById('cust-name').value.trim() !== '';
  const datesOk = dateGroups.length > 0 && dateGroups.every(g => g.date && g.addresses.every(a => a.receiver && a.address));
  
  const btn = document.getElementById('btn-submit');
  if(nameOk && datesOk && allMatched) {
    btn.disabled = false;
    btn.innerText = "確認送出配送安排單";
  } else {
    btn.disabled = true;
    btn.innerText = "請完成盒數分配";
  }
}

async function submitForm() {
  document.getElementById('ov-loading').style.display = 'flex';
  const payload = {
    customer: document.getElementById('cust-name').value,
    phone: document.getElementById('cust-phone').value,
    mainProducts: mainProducts.map(p => ({ name: p.name==='自定義'?p.customName:p.name, total: p.totalQty })),
    dateGroups: dateGroups.map(g => ({
      date: g.date,
      addresses: g.addresses.map(a => ({
        receiver: a.receiver,
        address: a.address,
        items: Object.keys(a.items).map(pid => {
          const p = mainProducts.find(x => x.id == pid);
          return { name: p.name==='自定義'?p.customName:p.name, qty: a.items[pid] };
        }).filter(i => i.qty > 0)
      }))
    })),
    submittedAt: new Date().toLocaleString()
  };

  try {
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    document.getElementById('loading-box').innerHTML = `
      <h1 style="color:var(--gold); font-family:'Noto Serif TC',serif;">✓ 送出成功</h1>
      <p>配送資料已同步至雲端試算表</p>
      <button onclick="location.reload()" style="margin-top:25px; padding:12px 40px; background:var(--gold); border:none; color:#fff; border-radius:30px; font-weight:700; cursor:pointer;">返回重新填寫</button>
    `;
  } catch(e) {
    alert("網路異常，請檢查連線後再試。");
    document.getElementById('ov-loading').style.display = 'none';
  }
}

// 預設給一個品項
addMainProd();
</script>
</body>
</html>
