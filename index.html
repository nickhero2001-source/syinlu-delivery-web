<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>幸福+工場・配送調度系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --bg: #f9f6f2; --primary: #2c2416; --accent: #c9a96e; --text: #3d352a; --border: #e3ddd3; --orange: #d4622a; --green: #2d8a54; }
  * { box-sizing: border-box; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 240px; }
  .header { background: var(--primary); padding: 25px; text-align: center; color: #fff; border-bottom: 6px solid var(--accent); }
  .wrapper { max-width: 800px; margin: 0 auto; padding: 0 15px; }
  .main-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 15px; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
  .date-group { background: #fff; border-radius: 12px; border: 1px solid var(--border); margin-top: 25px; overflow: hidden; }
  .date-head { background: #fcfaf7; padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .place-card { margin: 12px; padding: 15px; background: #fff; border: 1px solid var(--border); border-radius: 8px; border-left: 5px solid var(--accent); }
  input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 16px; margin-bottom: 8px; }
  .qty-field { width: 80px !important; text-align: center; font-weight: 700; border: 2px solid var(--accent) !important; margin-bottom: 0; }
  .btn-ghost { background: transparent; border: 2px dashed var(--accent); color: var(--accent); padding: 12px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }
  .footer-summary { background: var(--primary); padding: 20px; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; border-top: 4px solid var(--accent); }
  .status-pills { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-bottom: 15px; }
  .pill { padding: 4px 10px; border-radius: 50px; font-size: 11px; font-weight: 700; color: #fff; }
  .pill-ok { background: var(--green); }
  .pill-wait { background: var(--orange); }
  .btn-primary { width: 100%; max-width: 400px; padding: 16px; background: var(--accent); color: #fff; border: none; border-radius: 50px; font-size: 18px; font-weight: 700; cursor: pointer; display: block; margin: 0 auto; }
</style>
</head>
<body>

<header class="header"><h2 style="margin:0;">配送安排調度系統</h2></header>

<div class="wrapper">
  <div class="main-card">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;">
      <div><small>訂購人姓名 *</small><input type="text" id="cust-name" oninput="syncCustData()"></div>
      <div><small>聯絡電話</small><input type="tel" id="cust-phone" oninput="syncCustData()"></div>
    </div>
    <div id="main-prod-list"></div>
    <button class="btn-ghost" onclick="addMainProd()">＋ 新增產品品項</button>
  </div>
  <div id="date-group-container"></div>
  <button class="btn-ghost" style="background:var(--primary); color:white; margin-bottom:100px;" onclick="addDateGroup()">＋ 新增配送日期</button>
</div>

<div class="footer-summary">
  <div class="status-pills" id="summary-pills"></div>
  <button class="btn-primary" id="btn-submit" onclick="submitForm()" disabled>請填寫必要資訊</button>
</div>

<div id="ov-loading" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; color:#fff; align-items:center; justify-content:center;">
  <div id="loading-msg"><h2>傳送中...</h2></div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycby6Qj3UxB2dB0FR8mbWidJ8tWD8XrmXIyPuwUM6TFLZnY-Q393PsdTeD4AiOQK_PoDs/exec';
const PRODUCT_LIST = ["星空不來梅．單層綜果款", "星空不來梅．雙層綜果款", "星空不來梅．單層吃茶款", "星空不來梅．雙層吃茶款", "美好時光．雙層綜合款(餅乾+鳳梨酥+長蛋2)", "美好時光．雙層綜合款(12長蛋餅鳳款)", "美好時光．單層餅乾蛋捲款", "美好時光．單層蛋捲款", "花獻．餅乾款", "花獻．餅乾蛋捲款", "小協奏禮盒．餅乾款", "小協奏禮盒．餅乾蛋捲款", "幸福花磚．綜合款雙層", "幸福花磚．餅乾款雙層", "幸福花磚．綜合款三層", "Happy Together．16支蛋捲餅乾款", "Happy Together．8支蛋捲綜合款", "Happy Together．8入土鳳梨酥", "一起幸福吧．麵包樹聯名", "美好夢想．A餅鳳款", "美好夢想．B綜合款", "美好夢想．C餅蛋款", "美好夢想S．餅乾蛋捲組", "Wonderful World．精彩世界", "愛麗絲夢遊仙境．蛋捲組", "愛麗絲夢遊仙境．蛋捲餅乾組", "星空．幸福+蛋捲鐵盒(芝麻)", "星空．幸福+蛋捲鐵盒(咖啡)", "星空．幸福+蛋捲鐵盒(巧克力)", "星空．幸福+蛋捲鐵盒(原味)", "星空．幸福+蛋捲鐵盒(香蕉)", "星空．幸福+蛋捲鐵盒(紅茶)", "星空．幸福+蛋捲鐵盒(抹茶)", "星空．幸福+蛋捲鐵盒(紅藜)", "星空．幸福+蛋捲鐵盒(小農)", "星空．幸福+蛋捲鐵盒(經典)", "蛋捲．家庭分享包", "核你同頻綠．中式漢餅", "自定義"];

let customerData = { name: '', phone: '' };
let mainProducts = [];
let dateGroups = [];

function syncCustData() {
  customerData.name = document.getElementById('cust-name').value;
  customerData.phone = document.getElementById('cust-phone').value;
  updateSummary();
}

function addMainProd() {
  mainProducts.push({ id: Date.now(), name: PRODUCT_LIST[0], customName: '', totalQty: '' });
  render();
}

function addDateGroup() {
  dateGroups.push({ id: Date.now(), date: '', addresses: [{ id: Date.now()+1, receiver: '', rPhone: '', address: '', items: {} }] });
  render();
}

function addAddress(gId) {
  const g = dateGroups.find(x => x.id === gId);
  g.addresses.push({ id: Date.now(), receiver: '', rPhone: '', address: '', items: {} });
  render();
}

function render() {
  const mList = document.getElementById('main-prod-list');
  mList.innerHTML = mainProducts.map(p => `
    <div style="background:#fdfbf8; border:1px solid #eee; padding:10px; border-radius:8px; margin-bottom:10px;">
      <div style="display:flex; gap:5px; align-items:center;">
        <select style="flex:1; margin-bottom:0;" onchange="mainProducts.find(m=>m.id===${p.id}).name=this.value; render();">
          ${PRODUCT_LIST.map(opt => `<option value="${opt}" ${p.name===opt?'selected':''}>${opt}</option>`).join('')}
        </select>
        <input type="number" min="1" step="1" class="qty-field" placeholder="總數" value="${p.totalQty}" oninput="mainProducts.find(m=>m.id===${p.id}).totalQty=Math.abs(Math.floor(this.value)) || ''; updateSummary();">
        <button onclick="mainProducts=mainProducts.filter(x=>x.id!==${p.id}); render();" style="border:none;background:none;color:red;font-size:18px;">✕</button>
      </div>
      ${p.name==='自定義'?`<input type="text" placeholder="輸入產品名" style="margin-top:5px;" value="${p.customName}" oninput="mainProducts.find(m=>m.id===${p.id}).customName=this.value; updateSummary();">`:''}
    </div>
  `).join('');

  const gContainer = document.getElementById('date-group-container');
  gContainer.innerHTML = dateGroups.map(g => `
    <div class="date-group">
      <div class="date-head">
        <input type="date" value="${g.date}" onchange="dateGroups.find(x=>x.id===${g.id}).date=this.value; updateSummary();" style="width:160px; margin:0;">
        <button onclick="dateGroups=dateGroups.filter(x=>x.id!==${g.id}); render();" style="border:none;background:none;color:red;">移除日期</button>
      </div>
      ${g.addresses.map((a, idx) => `
        <div class="place-card">
          <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><b>地點 ${idx+1}</b> <button onclick="let tg=dateGroups.find(x=>x.id===${g.id}); tg.addresses=tg.addresses.filter(x=>x.id!==${a.id}); render();" style="border:none;background:none;color:red;font-size:12px;">移除</button></div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <input type="text" placeholder="收件人" value="${a.receiver}" oninput="dateGroups.find(g2=>g2.id===${g.id}).addresses.find(a2=>a2.id===${a.id}).receiver=this.value; updateSummary();">
            <input type="tel" placeholder="電話" value="${a.rPhone}" oninput="dateGroups.find(g2=>g2.id===${g.id}).addresses.find(a2=>a2.id===${a.id}).rPhone=this.value; updateSummary();">
          </div>
          <input type="text" placeholder="配送地址" value="${a.address}" oninput="dateGroups.find(g2=>g2.id===${g.id}).addresses.find(a2=>a2.id===${a.id}).address=this.value; updateSummary();">
          <div style="margin-top:5px; border-top:1px solid #eee; padding-top:10px;">
            ${mainProducts.map(p => `
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                <span style="font-size:12px; color:#666;">${p.name==='自定義'? (p.customName||'自定義') : p.name}</span>
                <input type="number" min="0" step="1" class="qty-field" placeholder="0" value="${a.items[p.id]||''}" oninput="dateGroups.find(g2=>g2.id===${g.id}).addresses.find(a2=>a2.id===${a.id}).items[${p.id}]=Math.abs(Math.floor(this.value)) || ''; updateSummary();">
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
      <button class="btn-ghost" style="width:calc(100% - 24px); margin:12px;" onclick="addAddress(${g.id})">＋ 此日新增配送地</button>
    </div>
  `).join('');
  updateSummary();
}

function updateSummary() {
  const btn = document.getElementById('btn-submit');
  const pills = document.getElementById('summary-pills');
  let allMatched = true;

  pills.innerHTML = mainProducts.map(p => {
    let target = parseInt(p.totalQty) || 0;
    let current = 0;
    dateGroups.forEach(g => g.addresses.forEach(a => { current += parseInt(a.items[p.id]) || 0; }));
    const ok = (target > 0 && target === current);
    if (!ok) allMatched = false;
    const pName = p.name==='自定義' ? (p.customName || '品項') : p.name;
    return `<span class="pill ${ok ? 'pill-ok' : 'pill-wait'}">${pName}: ${current}/${target}</span>`;
  }).join('');

  const nameOk = customerData.name.trim() !== "";
  const dateOk = dateGroups.length > 0 && dateGroups.every(g => g.date !== "");
  const addrOk = dateGroups.every(g => g.addresses.every(a => a.receiver.trim() !== "" && a.address.trim() !== ""));

  if (nameOk && dateOk && addrOk) {
    btn.disabled = false;
    btn.innerText = allMatched ? "確認送出單據" : "盒數未對齊，確認送出？";
    btn.style.background = allMatched ? "var(--green)" : "var(--orange)";
  } else {
    btn.disabled = true;
    btn.innerText = "請填寫姓名、日期與收件地";
    btn.style.background = "#555";
  }
}

async function submitForm() {
  const btn = document.getElementById('btn-submit');
  if(btn.innerText.includes("未對齊")) { if(!confirm("盒數分配尚未對齊，確定要送出嗎？")) return; }
  
  document.getElementById('ov-loading').style.display = 'flex';
  
  // 關鍵修正：在電話前面補一個 ' 強制試算表當文字處理，避免開頭的 0 被刪除
  const payload = {
    customer: customerData.name,
    phone: (customerData.phone.startsWith("'") ? customerData.phone : "'" + customerData.phone),
    dateGroups: dateGroups.map(g => ({
      date: g.date,
      addresses: g.addresses.map(a => {
        let items = [];
        mainProducts.forEach(p => { 
          if(a.items[p.id]) items.push({ name: p.name==='自定義'?p.customName:p.name, qty: parseInt(a.items[p.id]) }); 
        });
        return { 
          receiver: a.receiver, 
          phone: (a.rPhone.startsWith("'") ? a.rPhone : "'" + a.rPhone), // 強制文字格式
          address: a.address, 
          items: items 
        };
      })
    }))
  };

  try {
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    setTimeout(() => {
      document.getElementById('loading-msg').innerHTML = `<h2 style="color:var(--green)">發送成功！</h2><button onclick="location.reload()" style="padding:10px 30px;background:white;border:none;border-radius:20px;margin-top:10px;cursor:pointer;">回首頁</button>`;
    }, 1500);
  } catch(e) {
    alert("發送失敗。");
    document.getElementById('ov-loading').style.display = 'none';
  }
}
addMainProd();
</script>
</body>
</html>
