<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>幸福+工場・配送調度系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f9f6f2; --card-bg: #ffffff; --primary: #2c2416; --accent: #c9a96e;
    --accent-dark: #a68a55; --text: #3d352a; --text-light: #7a6e5d; --border: #e3ddd3;
    --orange: #d4622a;
  }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 240px; }
  .header { background: var(--primary); padding: 40px 20px; text-align: center; color: #fff; position: relative; }
  .header::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: var(--accent); }
  .header h1 { font-family: 'Noto Serif TC', serif; font-size: 28px; margin: 0; letter-spacing: 2px; }
  .wrapper { max-width: 800px; margin: 0 auto; padding: 0 15px; }
  .section-title { font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 700; color: var(--accent-dark); margin: 30px 0 15px; display: flex; align-items: center; gap: 10px; }
  .main-card { background: var(--card-bg); border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border: 1px solid var(--border); margin-bottom: 20px; }
  .card-padding { padding: 20px; }
  .total-control { background: #fdfbf8; border: 1px solid var(--border); border-radius: 10px; padding: 15px; margin-top: 10px; }
  .prod-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 10px; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
  .prod-row select { flex: 1; min-width: 150px; }
  .date-group { background: var(--card-bg); border-radius: 15px; border: 1px solid var(--border); margin-bottom: 30px; }
  .date-head { background: #fcfaf7; padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; border-radius: 15px 15px 0 0; }
  .place-card { margin: 15px; padding: 15px; background: #fff; border: 1px solid var(--border); border-radius: 10px; border-left: 5px solid var(--accent); }
  .input-group { margin-bottom: 15px; }
  .input-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 5px; color: var(--text-light); }
  input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; }
  .qty-field { width: 80px !important; text-align: center; font-weight: 700; border: 2px solid var(--accent) !important; }
  .btn-ghost { background: transparent; border: 2px dashed var(--accent); color: var(--accent-dark); padding: 12px; width: 100%; border-radius: 10px; font-weight: 700; cursor: pointer; }
  .btn-del { color: var(--orange); border: none; background: none; cursor: pointer; font-size: 13px; }
  .footer-summary { background: var(--primary); padding: 20px; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; border-top: 4px solid var(--accent); }
  .status-pills { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 15px; }
  .pill { padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 700; border: 1px solid rgba(255,255,255,0.2); color: #fff; }
  .pill-ok { background: #2d8a54; }
  .pill-wait { background: #d4622a; }
  .btn-primary { width: 100%; max-width: 400px; padding: 18px; background: var(--accent); color: #fff; border: none; border-radius: 50px; font-size: 18px; font-weight: 700; cursor: pointer; display: block; margin: 0 auto; }
  .btn-primary:disabled { background: #555; opacity: 0.7; cursor: not-allowed; font-size: 14px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
</style>
</head>
<body onclick="updateSummary()">

<header class="header">
  <h1>幸福+工場配送安排單</h1>
</header>

<div class="wrapper">
  <div class="section-title"><i>1</i> 訂單總量與訂購人</div>
  <div class="main-card">
    <div class="card-padding">
      <div class="grid-2">
        <div class="input-group"><label>訂購人姓名 *</label><input type="text" id="cust-name" placeholder="必填" oninput="updateSummary()"></div>
        <div class="input-group"><label>聯絡電話</label><input type="tel" id="cust-phone"></div>
      </div>
      <div class="total-control">
        <div id="main-prod-list"></div>
        <button class="btn-ghost" onclick="addMainProd()">＋ 新增訂購品項</button>
      </div>
    </div>
  </div>
  <div class="section-title"><i>2</i> 配送計畫</div>
  <div id="date-group-container"></div>
  <button class="btn-ghost" style="background:var(--primary); color:var(--accent); border:none; margin-bottom:80px;" onclick="addDateGroup()">＋ 新增出貨日期</button>
</div>

<div class="footer-summary">
  <div class="status-pills" id="summary-pills"></div>
  <button class="btn-primary" id="btn-submit" onclick="submitForm()" disabled>請填寫資訊</button>
</div>

<div id="ov-loading" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; color:#fff; align-items:center; justify-content:center;">
  <div style="text-align:center;"><h2>正在同步資料...</h2></div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycby6Qj3UxB2dB0FR8mbWidJ8tWD8XrmXIyPuwUM6TFLZnY-Q393PsdTeD4AiOQK_PoDs/exec';
const PRODUCT_LIST = ["星空不來梅．單層綜果款", "星空不來梅．雙層綜果款", "星空不來梅．單層吃茶款", "星空不來梅．雙層吃茶款", "美好時光．雙層綜合款(餅乾+鳳梨酥+長蛋2)", "美好時光．雙層綜合款(12長蛋餅鳳款)", "美好時光．單層餅乾蛋捲款", "美好時光．單層蛋捲款", "花獻．餅乾款", "花獻．餅乾蛋捲款", "小協奏禮盒．餅乾款", "小協奏禮盒．餅乾蛋捲款", "幸福花磚．綜合款雙層", "幸福花磚．餅乾款雙層", "幸福花磚．綜合款三層", "Happy Together．16支蛋捲餅乾款", "Happy Together．8支蛋捲綜合款", "Happy Together．8入土鳳梨酥", "一起幸福吧．麵包樹聯名", "美好夢想．A餅鳳款", "美好夢想．B綜合款", "美好夢想．C餅蛋款", "美好夢想S．餅乾蛋捲組", "Wonderful World．精采世界", "愛麗絲夢遊仙境．蛋捲組", "愛麗絲夢遊仙境．蛋捲餅乾組", "星空．幸福+蛋捲鐵盒(芝麻)", "星空．幸福+蛋捲鐵盒(咖啡)", "星空．幸福+蛋捲鐵盒(巧克力)", "星空．幸福+蛋捲鐵盒(原味)", "星空．幸福+蛋捲鐵盒(香蕉)", "星空．幸福+蛋捲鐵盒(紅茶)", "星空．幸福+蛋捲鐵盒(抹茶)", "星空．幸福+蛋捲鐵盒(紅藜)", "星空．幸福+蛋捲鐵盒(小農)", "星空．幸福+蛋捲鐵盒(經典)", "蛋捲．家庭分享包", "核你同頻綠．中式漢餅", "自定義"];

let mainProducts = [];
let dateGroups = [];

function forceInt(input) { input.value = input.value.replace(/[^0-9]/g, ''); }

function addMainProd() {
  mainProducts.push({ id: Date.now(), name: PRODUCT_LIST[0], customName: '', totalQty: '' });
  render();
}

function addDateGroup() {
  const gId = Date.now();
  dateGroups.push({ id: gId, date: '', addresses: [{ id: gId+1, receiver: '', receiverPhone: '', address: '', items: {} }] });
  render();
}

function render() {
  document.getElementById('main-prod-list').innerHTML = mainProducts.map(p => `
    <div class="prod-row">
      <select onchange="p=mainProducts.find(x=>x.id===${p.id});p.name=this.value;render();">
        ${PRODUCT_LIST.map(opt => `<option value="${opt}" ${p.name===opt?'selected':''}>${opt}</option>`).join('')}
      </select>
      <input type="number" class="qty-field" placeholder="總數" value="${p.totalQty}" oninput="forceInt(this); p=mainProducts.find(x=>x.id===${p.id}); p.totalQty=this.value; updateSummary();">
      <button class="btn-del" onclick="mainProducts=mainProducts.filter(x=>x.id!==${p.id});render();">✕</button>
      ${p.name==='自定義'?`<input type="text" placeholder="名稱" style="width:100%;margin-top:5px;" value="${p.customName}" oninput="p=mainProducts.find(x=>x.id===${p.id}); p.customName=this.value; updateSummary();">`:''}
    </div>
  `).join('');

  document.getElementById('date-group-container').innerHTML = dateGroups.map(g => `
    <div class="date-group">
      <div class="date-head">
        <input type="date" value="${g.date}" onchange="g.date=this.value; updateSummary();" style="width:160px;">
        <button class="btn-del" onclick="dateGroups=dateGroups.filter(x=>x.id!==${g.id});render();">移除日期</button>
      </div>
      ${g.addresses.map((a, idx) => `
        <div class="place-card">
          <div style="display:flex;justify-content:space-between;margin-bottom:10px;"><b>地點 ${idx+1}</b><button class="btn-del" onclick="g=dateGroups.find(x=>x.id===${g.id});g.addresses=g.addresses.filter(x=>x.id!==${a.id});render();">移除</button></div>
          <div class="grid-2">
            <input type="text" placeholder="收件人" value="${a.receiver}" oninput="a.receiver=this.value; updateSummary();">
            <input type="tel" placeholder="電話" value="${a.receiverPhone||''}" oninput="a.receiverPhone=this.value; updateSummary();">
            <input type="text" placeholder="地址" style="grid-column:span 2;" value="${a.address}" oninput="a.address=this.value; updateSummary();">
          </div>
          <div style="margin-top:10px; border-top:1px solid #eee; padding-top:10px;">
            ${mainProducts.map(p => `
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
                <span style="font-size:13px;">${p.name==='自定義'?p.customName:p.name}</span>
                <input type="number" class="qty-field" placeholder="0" value="${a.items[p.id]||''}" oninput="forceInt(this); a.items[${p.id}]=this.value; updateSummary();">
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
      <div style="padding:10px 15px;"><button class="btn-ghost" onclick="dateGroups.find(x=>x.id===${g.id}).addresses.push({id:Date.now(),receiver:'',address:'',items:{}});render();">＋ 新增地址</button></div>
    </div>
  `).join('');
  updateSummary();
}

function updateSummary() {
  const btn = document.getElementById('btn-submit');
  const pills = document.getElementById('summary-pills');
  
  // 檢查訂購人
  const nameVal = document.getElementById('cust-name').value.trim();
  if(!nameVal) { btn.disabled = true; btn.innerText = "❌ 請填寫訂購人姓名"; return; }

  // 檢查品項總量有無設定
  if(mainProducts.length === 0) { btn.disabled = true; btn.innerText = "❌ 請至少新增一個品項"; return; }

  // 檢查日期與配送資訊
  if(dateGroups.length === 0) { btn.disabled = true; btn.innerText = "❌ 請新增出貨日期"; return; }
  
  for(let g of dateGroups) {
    if(!g.date) { btn.disabled = true; btn.innerText = "❌ 有日期尚未選擇"; return; }
    for(let a of g.addresses) {
      if(!a.receiver.trim()) { btn.disabled = true; btn.innerText = "❌ 有收件人姓名未填"; return; }
      if(!a.address.trim()) { btn.disabled = true; btn.innerText = "❌ 有地址未填"; return; }
    }
  }

  // 渲染小膠囊 (純顯示，不鎖死按鈕)
  pills.innerHTML = mainProducts.map(p => {
    let target = Number(p.totalQty) || 0;
    let current = 0;
    dateGroups.forEach(g => g.addresses.forEach(a => current += (Number(a.items[p.id]) || 0)));
    return `<span class="pill ${target>0 && target===current?'pill-ok':'pill-wait'}">${p.name==='自定義'?p.customName:p.name}: ${current}/${target}</span>`;
  }).join('');

  // 通過基礎檢查，解鎖
  btn.disabled = false;
  btn.innerText = "確認送出配送安排單";
}

async function submitForm() {
  document.getElementById('ov-loading').style.display = 'flex';
  const payload = {
    customer: document.getElementById('cust-name').value,
    phone: document.getElementById('cust-phone').value,
    dateGroups: dateGroups.map(g => ({
      date: g.date,
      addresses: g.addresses.map(a => {
        let items = [];
        mainProducts.forEach(p => { if(a.items[p.id]) items.push({name: p.name==='自定義'?p.customName:p.name, qty: a.items[p.id]}); });
        return { receiver: a.receiver, receiverPhone: a.receiverPhone, address: a.address, items: items };
      })
    }))
  };
  try {
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    setTimeout(() => {
      document.getElementById('ov-loading').innerHTML = `<div style="background:#fff;padding:40px;border-radius:20px;text-align:center;color:#2c2416;"><h1>送出成功</h1><button onclick="location.reload()" style="padding:10px 30px;background:#2c2416;color:#fff;border-radius:50px;">返回</button></div>`;
    }, 1000);
  } catch(e) { alert("發送失敗"); document.getElementById('ov-loading').style.display='none'; }
}

addMainProd();
</script>
</body>
</html>
