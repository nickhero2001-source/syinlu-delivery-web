<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>幸福+工場・配送安排單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0; --warm: #fff9f2; --gold: #c9a96e; --gold-dark: #9e7a45;
    --ink: #2c2416; --ink-mid: #6b5840; --border: #e5d8c5; --orange: #d4622a;
    --sans: 'Noto Sans TC', sans-serif; --serif: 'Noto Serif TC', serif;
  }
  
  * { box-sizing: border-box; }
  body { font-family: var(--sans); background: var(--cream); color: var(--ink); line-height: 1.6; margin: 0; padding-bottom: 180px; -webkit-font-smoothing: antialiased; }

  /* 標頭設計 */
  .header { background: var(--ink); padding: 40px 20px; text-align: center; color: #fff8ee; border-bottom: 5px solid var(--gold); }
  .header-badge { display: inline-block; font-family: var(--serif); font-size: 13px; letter-spacing: 4px; color: var(--gold); border: 1px solid rgba(201,169,110,0.4); padding: 6px 18px; margin-bottom: 12px; }
  .header h1 { font-family: var(--serif); font-size: 26px; margin: 0; letter-spacing: 2px; }
  .header h1 em { font-style: normal; color: var(--gold); margin-left: 8px; }

  .container { max-width: 900px; margin: 0 auto; padding: 20px 15px; }

  /* 卡片設計 */
  .card { background: var(--warm); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(44,36,22,0.05); overflow: hidden; }
  .card-head { background: var(--ink); padding: 15px 20px; display: flex; align-items: center; gap: 12px; color: #fff8ee; }
  .card-num { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--gold); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
  .card-title { font-size: 17px; font-weight: 500; letter-spacing: 1px; margin: 0; }
  .card-body { padding: 20px; }

  /* 表單欄位 */
  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--ink); }
  .field input, .field select, .field textarea { 
    width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 6px; 
    font-size: 16px; background: #fff; transition: 0.3s;
    appearance: none; -webkit-appearance: none; 
  }
  .field input:focus, .field select:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 0 3px rgba(201,169,110,0.15); }

  /* 品項卡片優化 */
  .prod-item { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 15px; position: relative; }
  .prod-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .prod-item-qty { display: flex; align-items: center; justify-content: space-between; background: var(--cream); padding: 12px 15px; border-radius: 8px; margin-top: 10px;}
  
  .prod-input { 
    width: 110px !important; 
    height: 48px; 
    text-align: center; 
    font-weight: 700; 
    font-size: 20px !important; 
    color: var(--ink); 
    background-color: #fff;
    border: 2px solid var(--gold) !important; 
    border-radius: 8px;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
  }
  
  .btn-remove { color: #d4622a; background: none; border: none; font-size: 14px; cursor: pointer; padding: 5px; font-weight: 600; }

  /* 配送點 */
  .del-card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; border-top: 4px solid var(--gold-dark); }
  .del-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #f0f0f0; }
  .del-title { color: var(--ink); font-weight: 600; font-size: 17px; }

  .qty-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #e5d8c5; gap: 15px;}
  .qty-row:last-child { border-bottom: none; }

  /* 按鈕 */
  .btn-add { background: #fff; border: 2px dashed var(--gold); color: var(--gold-dark); padding: 16px; width: 100%; cursor: pointer; border-radius: 8px; font-weight: 600; font-size: 16px; transition: 0.2s; }

  /* 底部固定狀態列 */
  .summary-bar { 
    background: var(--ink); color: var(--gold); padding: 15px; 
    display: flex; justify-content: space-around; align-items: center; 
    position: fixed; bottom: 80px; left: 0; width: 100%; z-index: 100; 
    font-size: 15px; font-weight: bold; box-shadow: 0 -4px 15px rgba(0,0,0,0.15);
  }
  
  .btn-submit { 
    width: 100%; padding: 20px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); 
    color: white; border: none; font-size: 18px; cursor: pointer; font-weight: 600; 
    letter-spacing: 4px; position: fixed; bottom: 0; left: 0; z-index: 101;
  }
  .btn-submit:disabled { background: #888; color: #ccc; cursor: not-allowed; }

  .overlay { 
    display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
    background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; flex-direction: column;
  }
  .overlay.show { display: flex !important; }
  .overlay-box { background: white; color: var(--ink); padding: 40px 30px; border-radius: 12px; text-align: center; width: 85%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

  @media (min-width: 768px) {
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .summary-bar { bottom: 90px; width: calc(100% - 40px); left: 20px; border-radius: 12px; }
    .btn-submit { bottom: 20px; width: calc(100% - 40px); left: 20px; border-radius: 12px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-badge">心路基金會・幸福+工場</div>
  <h1>禮盒<em>配送安排單</em></h1>
</header>

<main class="container">
  <section class="card">
    <div class="card-head"><span class="card-num">1</span><h2 class="card-title">訂購人基本資料</h2></div>
    <div class="card-body">
      <div class="field-grid">
        <div class="field"><label>訂購人姓名 *</label><input type="text" id="cust-name" oninput="updateSummary()" placeholder="請輸入姓名"></div>
        <div class="field"><label>聯絡電話 *</label><input type="tel" id="cust-phone" placeholder="例：0912345678"></div>
      </div>
      <div class="field"><label>備註說明</label><textarea id="cust-note" rows="2" placeholder="如有其他需求請備註"></textarea></div>
    </div>
  </section>

  <section class="card">
    <div class="card-head"><span class="card-num">2</span><h2 class="card-title">訂購品項與總盒數</h2></div>
    <div class="card-body" id="prod-container"></div>
    <div style="padding: 0 20px 20px 20px;">
      <button class="btn-add" onclick="addProd()">＋ 新增禮盒品項</button>
    </div>
  </section>

  <section class="card">
    <div class="card-head"><span class="card-num">3</span><h2 class="card-title">配送點安排</h2></div>
    <div class="card-body" id="delivery-container"></div>
    <div style="padding: 0 20px 20px 20px;">
      <button class="btn-add" onclick="addDel()">＋ 新增配送點 (地址)</button>
    </div>
  </section>
</main>

<div class="summary-bar" id="summary">
  <span>總盒數: 0</span> <span>已分配: 0</span> <span>待分配: 0</span>
</div>
<button class="btn-submit" id="btn-submit" onclick="submitForm()" disabled>確認送出配送安排單</button>

<div class="overlay" id="ov-loading">
  <div class="overlay-box">
    <h3>傳送中...</h3>
    <p>正在同步資料，請勿關閉視窗</p>
  </div>
</div>

<div class="overlay" id="ov-success">
  <div class="overlay-box">
    <h3>✓ 送出成功</h3>
    <p>感謝您的安排，資料已送出。</p>
    <button onclick="location.reload()" style="margin-top:20px; padding:12px 30px; background:var(--gold); border:none; color:white; border-radius:6px; font-size:16px; width:100%;">返回重新填寫</button>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycby6Qj3UxB2dB0FR8mbWidJ8tWD8XrmXIyPuwUM6TFLZnY-Q393PsdTeD4AiOQK_PoDs/exec';

const PRODUCT_LIST = [
  "星空不來梅．單層綜果款", "星空不來梅．雙層綜果款", "星空不來梅．單層吃茶款", "星空不來梅．雙層吃茶款",
  "美好時光．雙層綜合款(餅乾+鳳梨酥+長蛋2)", "美好時光．雙層綜合款(12長蛋餅鳳款)", "美好時光．單層餅乾蛋捲款", "美好時光．單層蛋捲款",
  "花獻．餅乾款", "花獻．餅乾蛋捲款", "小協奏禮盒．餅乾款", "小協奏禮盒．餅乾蛋捲款",
  "幸福花磚．綜合款雙層", "幸福花磚．餅乾款雙層", "幸福花磚．綜合款三層",
  "Happy Together．16支蛋捲餅乾款", "Happy Together．8支蛋捲綜合款", "Happy Together．8入土鳳梨酥",
  "一起幸福吧．麵包樹聯名", "美好夢想．A餅鳳款", "美好夢想．B綜合款", "美好夢想．C餅蛋款", "美好夢想S．餅乾蛋捲組",
  "Wonderful World．精采世界", "愛麗絲夢遊仙境．蛋捲組", "愛麗絲夢遊仙境．蛋捲餅乾組",
  "星空．幸福+蛋捲鐵盒(芝麻)", "星空．幸福+蛋捲鐵盒(咖啡)", "星空．幸福+蛋捲鐵盒(巧克力)", "星空．幸福+蛋捲鐵盒(原味)",
  "星空．幸福+蛋捲鐵盒(香蕉)", "星空．幸福+蛋捲鐵盒(紅茶)", "星空．幸福+蛋捲鐵盒(抹茶)", "星空．幸福+蛋捲鐵盒(紅藜)",
  "星空．幸福+蛋捲鐵盒(小農)", "星空．幸福+蛋捲鐵盒(經典)", "蛋捲．家庭分享包", "核你同頻綠．中式漢餅", "自定義"
];

let products = [];
let deliveries = [];

function addProd() {
  products.push({ id: Date.now(), name: PRODUCT_LIST[0], customName: '', total: '' });
  render();
}

function addDel() {
  deliveries.push({ id: Date.now(), name: '', date: '', address: '', items: {} });
  render();
}

function render() {
  const pBody = document.getElementById('prod-container');
  pBody.innerHTML = products.map((p, idx) => {
    const allocated = deliveries.reduce((sum, d) => sum + (Number(d.items[p.id]) || 0), 0);
    const pTotal = Number(p.total) || 0;
    const isOk = (allocated === pTotal && pTotal > 0);
    
    return `
      <div class="prod-item">
        <div class="prod-item-header">
          <span style="font-weight:bold; color:var(--gold-dark); font-size:16px;">品項 ${idx + 1}</span>
          <button class="btn-remove" onclick="removeP(${p.id})">移除 ✕</button>
        </div>
        <select onchange="updateP(${p.id},'name',this.value)" style="width:100%; margin-bottom:10px; padding:14px; font-size:16px; border-radius:6px; border:1px solid #ccc;">
          ${PRODUCT_LIST.map(opt => `<option value="${opt}" ${p.name===opt?'selected':''}>${opt}</option>`).join('')}
        </select>
        ${p.name==='自定義' ? `<input type="text" placeholder="請輸入自定義品名" oninput="updateP(${p.id},'customName',this.value)" value="${p.customName}" style="width:100%; margin-bottom:10px; padding:14px; font-size:16px; border:1px solid #ccc; border-radius:6px;">` : ''}
        
        <div class="prod-item-qty">
          <span style="font-size:15px; font-weight:600;">訂購總數</span>
          <div style="display:flex; align-items:center; gap:12px;">
            <span id="alloc-status-${p.id}" style="font-size:14px; color:${isOk?'#2d8a54':'#d4622a'}; font-weight:bold;">已分配: ${allocated}</span>
            <input type="number" inputmode="numeric" pattern="[0-9]*" class="prod-input" value="${p.total}" placeholder="填數量" oninput="updateQty(${p.id},this.value)">
          </div>
        </div>
      </div>
    `;
  }).join('');

  const dList = document.getElementById('delivery-container');
  dList.innerHTML = deliveries.map((d, idx) => `
    <div class="del-card">
      <div class="del-header">
        <span class="del-title">📍 配送點 ${idx+1}</span>
        <button class="btn-remove" onclick="removeD(${d.id})">移除此點 ✕</button>
      </div>
      <div class="field"><label>收件人姓名 *</label><input type="text" oninput="updateD(${d.id},'name',this.value)" value="${d.name}" placeholder="請輸入姓名"></div>
      
      <div class="field">
        <label>預計到貨日 * (週六日不配送)</label>
        <input type="date" onchange="validateDate(${d.id}, this)" value="${d.date}">
      </div>
      
      <div class="field"><label>完整地址 *</label><input type="text" oninput="updateD(${d.id},'address',this.value)" value="${d.address}" placeholder="請輸入完整收件地址"></div>
      
      <div style="background:#fdfaf5; padding:15px; border-radius:8px; margin-top:20px; border: 1px solid #f0e6d2;">
        <div style="font-size:14px; font-weight:bold; color:var(--ink-mid); margin-bottom:12px;">分配至此地址的盒數：</div>
        ${products.map(p => {
          const pName = p.name==='自定義' ? (p.customName||'自定義品項') : p.name;
          return `
            <div class="qty-row">
              <span style="font-size:16px; line-height:1.4; font-weight:500;">${pName}</span>
              <input type="number" inputmode="numeric" pattern="[0-9]*" class="prod-input" placeholder="0" oninput="updateDelQty(${d.id},${p.id},this.value)" value="${d.items[p.id]||''}">
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `).join('');
  
  updateSummary();
}

/* ⭐️ 檢查是否為六日 ⭐️ */
function validateDate(did, input) {
  const selectedDate = new Date(input.value);
  const day = selectedDate.getDay(); // 0 是週日, 6 是週六
  
  if (day === 0 || day === 6) {
    alert("抱歉，心路工場週六、週日不提供配送/到貨服務，請選擇平日日期。");
    input.value = ""; // 清空不可選的日期
    updateD(did, 'date', "");
  } else {
    updateD(did, 'date', input.value);
  }
}

function updateP(id, f, v) { 
  products.find(x => x.id === id)[f] = v; 
  render(); 
}

function updateQty(pid, v) {
  let p = products.find(x => x.id === pid);
  p.total = v === '' ? '' : Number(v);
  updateStatusUI(pid);
  updateSummary();
}

function updateDelQty(did, pid, v) {
  deliveries.find(x => x.id === did).items[pid] = v === '' ? '' : Number(v);
  updateStatusUI(pid);
  updateSummary();
}

function updateStatusUI(pid) {
  let p = products.find(x => x.id === pid);
  if (!p) return;
  let allocated = deliveries.reduce((sum, d) => sum + (Number(d.items[pid]) || 0), 0);
  let pTotal = Number(p.total) || 0;
  let isOk = (allocated === pTotal && pTotal > 0);
  
  let statusSpan = document.getElementById(`alloc-status-${pid}`);
  if(statusSpan) {
    statusSpan.innerText = `已分配: ${allocated}`;
    statusSpan.style.color = isOk ? '#2d8a54' : '#d4622a';
  }
}

function removeP(id){ products = products.filter(x=>x.id!==id); render(); }
function updateD(id,f,v){ deliveries.find(x=>x.id===id)[f]=v; updateSummary(); }
function removeD(id){ deliveries = deliveries.filter(x=>x.id!==id); render(); }

function updateSummary() {
  const total = products.reduce((s,p)=>s + (Number(p.total)||0), 0);
  let allocated = 0;
  deliveries.forEach(d => Object.values(d.items).forEach(v => allocated += (Number(v)||0)));
  const diff = total - allocated;
  
  const diffColor = diff === 0 && total > 0 ? '#4ade80' : '#f87171';
  
  document.getElementById('summary').innerHTML = `
    <span>總盒數: ${total}</span> 
    <span>已分配: ${allocated}</span> 
    <span style="color:${diffColor};">待分配: ${diff}</span>
  `;

  const nameFilled = document.getElementById('cust-name').value.trim() !== '';
  const hasProducts = products.length > 0 && total > 0;
  const hasDeliveries = deliveries.length > 0;
  const delAllFilled = deliveries.every(d => d.name.trim() && d.address.trim() && d.date);
  
  const isComplete = nameFilled && hasProducts && hasDeliveries && delAllFilled && (diff === 0);
  
  document.getElementById('btn-submit').disabled = !isComplete;
  document.getElementById('btn-submit').innerText = isComplete ? '確認送出配送安排單' : '請完成所有資料與數量分配';
}

async function submitForm() {
  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  document.getElementById('ov-loading').classList.add('show');

  const payload = {
    customerName: document.getElementById('cust-name').value.trim(),
    customerPhone: document.getElementById('cust-phone').value.trim(),
    note: document.getElementById('cust-note').value.trim(),
    products: products.map(p => ({ 
      name: p.name === '自定義' ? p.customName : p.name, 
      total: Number(p.total) || 0 
    })),
    deliveries: deliveries.map(d => ({
      name: d.name.trim(), 
      address: d.address.trim(), 
      date: d.date,
      items: Object.keys(d.items).map(pid => {
        const pObj = products.find(p => p.id == pid);
        return {
          productName: (pObj?.name === '自定義' ? pObj?.customName : pObj?.name) || '未知品項',
          qty: Number(d.items[pid]) || 0
        };
      }).filter(i => i.qty > 0)
    })),
    submittedAt: new Date().toLocaleString()
  };

  try {
    await fetch(GAS_URL, { 
      method: 'POST', 
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload) 
    });
    
    document.getElementById('ov-loading').classList.remove('show');
    document.getElementById('ov-success').classList.add('show');
  } catch (e) {
    alert('網路傳輸發生異常，請檢查連線後再試一次。');
    document.getElementById('ov-loading').classList.remove('show');
    btn.disabled = false;
  }
}

addProd();
addDel();
</script>
</body>
</html>
