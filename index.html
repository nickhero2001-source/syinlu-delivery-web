<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幸福+工場・配送安排單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0; --warm: #fff9f2; --gold: #c9a96e; --gold-dark: #9e7a45;
    --ink: #2c2416; --ink-mid: #6b5840; --border: #e5d8c5; --orange: #d4622a;
    --sans: 'Noto Sans TC', sans-serif; --serif: 'Noto Serif TC', serif;
  }
  body { font-family: var(--sans); background: var(--cream); color: var(--ink); line-height: 1.6; margin: 0; padding-bottom: 120px; }
  
  /* 標頭美化 */
  .header { background: var(--ink); padding: 50px 20px; text-align: center; color: #fff8ee; border-bottom: 4px solid var(--gold); }
  .header-badge { display: inline-block; font-family: var(--serif); font-size: 11px; letter-spacing: 4px; color: var(--gold); border: 1px solid rgba(201,169,110,0.3); padding: 5px 20px; margin-bottom: 15px; text-transform: uppercase; }
  .header h1 { font-family: var(--serif); font-size: 28px; margin: 0; font-weight: 600; letter-spacing: 2px; }
  .header h1 em { font-style: normal; color: var(--gold); margin-left: 10px; }

  .container { max-width: 880px; margin: -30px auto 0; padding: 0 20px; }
  
  /* 卡片設計 */
  .card { background: var(--warm); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 25px; box-shadow: 0 4px 12px rgba(44,36,22,0.05); overflow: hidden; }
  .card-head { background: var(--ink); padding: 15px 25px; display: flex; align-items: center; gap: 12px; color: #fff8ee; }
  .card-num { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--gold); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
  .card-title { font-size: 15px; font-weight: 500; letter-spacing: 1px; margin: 0; }
  .card-body { padding: 25px; }

  /* 表單元素 */
  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; color: var(--ink-mid); }
  .field input, .field select, .field textarea { 
    width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 4px; 
    font-size: 15px; transition: all 0.3s; background: #fff; box-sizing: border-box;
  }
  .field input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 0 3px rgba(201,169,110,0.1); }

  /* 品項表格 */
  .prod-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
  .prod-table th { text-align: left; font-size: 12px; color: var(--ink-light); padding: 10px; border-bottom: 1px solid var(--border); }
  .prod-table td { padding: 12px 10px; border-bottom: 1px solid #eee; }
  
  /* 配送點卡片 */
  .del-card { background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 20px; margin-bottom: 20px; position: relative; }
  .del-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
  .del-title { color: var(--gold-dark); font-weight: 600; font-size: 15px; }
  
  .qty-alloc-box { background: var(--cream); border-radius: 4px; padding: 15px; margin-top: 15px; }
  .qty-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 0; border-bottom: 1px dashed #e5d8c5; }
  .qty-row:last-child { border-bottom: none; }

  /* 按鈕 */
  .btn-add { 
    background: #fff; border: 1.5px dashed var(--gold); color: var(--gold-dark); 
    padding: 12px; width: 100%; cursor: pointer; border-radius: 4px; font-weight: 600; 
    transition: 0.2s; font-size: 14px;
  }
  .btn-add:hover { background: var(--warm); border-style: solid; }
  
  .summary-bar { 
    background: var(--ink); color: var(--gold); padding: 20px; border-radius: 8px; 
    display: flex; justify-content: space-around; align-items: center; 
    margin: 30px 0; border: 1px solid var(--gold); position: sticky; bottom: 90px; z-index: 100;
  }
  
  .btn-submit { 
    width: 100%; padding: 20px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); 
    color: white; border: none; font-size: 18px; cursor: pointer; font-weight: 600; 
    letter-spacing: 4px; border-radius: 8px; box-shadow: 0 4px 15px rgba(44,36,22,0.2);
  }
  .btn-submit:disabled { background: #bbb; cursor: not-allowed; box-shadow: none; }

  .status-tag { font-size: 12px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
  .status-err { background: #ffdada; color: #d4622a; }
  .status-ok { background: #d4f4e2; color: #2d8a54; }

  /* 遮罩 */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); color: white; align-items: center; justify-content: center; z-index: 2000; }
  .overlay.show { display: flex; }
  .overlay-box { background: white; color: var(--ink); padding: 40px; border-radius: 12px; text-align: center; max-width: 300px; }
</style>
</head>
<body>

<header class="header">
  <div class="header-badge">心路基金會・幸福+工場</div>
  <h1>禮盒<em>配送安排單</em></h1>
</header>

<main class="container">
  <section class="card">
    <div class="card-head"><span class="card-num">1</span><h2 class="card-title">訂購人基本資料</h2></div>
    <div class="card-body">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="field"><label>訂購人姓名 *</label><input type="text" id="cust-name" oninput="updateSummary()"></div>
        <div class="field"><label>聯絡電話 *</label><input type="tel" id="cust-phone"></div>
      </div>
      <div class="field"><label>備註說明</label><textarea id="cust-note" rows="2"></textarea></div>
    </div>
  </section>

  <section class="card">
    <div class="card-head"><span class="card-num">2</span><h2 class="card-title">已訂購品項與總盒數</h2></div>
    <div class="card-body">
      <table class="prod-table">
        <thead><tr><th>品項名稱</th><th style="width:100px;">總盒數</th><th style="width:120px;">配送進度</th><th style="width:40px;"></th></tr></thead>
        <tbody id="prod-body"></tbody>
      </table>
      <button class="btn-add" onclick="addProd()">＋ 新增禮盒品項</button>
    </div>
  </section>

  <section class="card">
    <div class="card-head"><span class="card-num">3</span><h2 class="card-title">配送點安排</h2></div>
    <div class="card-body">
      <div id="delivery-list"></div>
      <button class="btn-add" onclick="addDel()">＋ 新增配送點 (地址)</button>
    </div>
  </section>

  <div class="summary-bar" id="summary"></div>
  
  <button class="btn-submit" id="btn-submit" onclick="submitForm()" disabled>確認送出配送安排單</button>
  <p id="error-hint" style="text-align:center; color:var(--orange); font-size:13px; margin-top:10px; font-weight:500;">請先填寫姓名並分配完所有盒數</p>
</main>

<div class="overlay" id="ov-loading"><div class="overlay-box"><h3>傳送中...</h3><p>正在同步資料至試算表</p></div></div>
<div class="overlay" id="ov-success"><div class="overlay-box"><h3>✓ 送出成功</h3><p>已收到您的配送安排，謝謝！</p><button onclick="location.reload()" style="margin-top:20px; padding:8px 20px; cursor:pointer; background:var(--gold); border:none; color:white; border-radius:4px;">重新填寫</button></div></div>

<script>
// ★ 請在此更換為您的新版 GAS 網址
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyccQ59ryobwSBx21vhGc_-Vw7rMefEsa9qHQ1XrGEcy8686Pfwd_NMOnZAPCqRWpXV/exec';

const PRODUCT_LIST = [
  "星空不來梅．單層綜果款", "星空不來梅．雙層綜果款", "星空不來梅．單層吃茶款", "星空不來梅．雙層吃茶款",
  "美好時光．雙層綜合款(餅乾+鳳梨酥+長蛋2)", "美好時光．雙層綜合款(12長蛋餅鳳款)", "美好時光．單層餅乾蛋捲款", "美好時光．單層蛋捲款",
  "花獻．餅乾款", "花獻．餅乾蛋捲款", "小協奏禮盒．餅乾款", "小協奏禮盒．餅乾蛋捲款",
  "幸福花磚．綜合款雙層", "幸福花磚．餅乾款雙層", "幸福花磚．綜合款三層",
  "Happy Together．16支蛋捲餅乾款", "Happy Together．8支蛋捲綜合款", "Happy Together．8入土鳳梨酥",
  "一起幸福吧．麵包樹聯名", "美好夢想．A餅鳳款", "美好夢夢想．B綜合款", "美好夢想．C餅蛋款", "美好夢想S．餅乾蛋捲組",
  "Wonderful World．精采世界", "愛麗絲夢遊仙境．蛋捲組", "愛麗絲夢遊仙境．蛋捲餅乾組",
  "星空．幸福+蛋捲鐵盒(芝麻)", "星空．幸福+蛋捲鐵盒(咖啡)", "星空．幸福+蛋捲鐵盒(巧克力)", "星空．幸福+蛋捲鐵盒(原味)",
  "星空．幸福+蛋捲鐵盒(香蕉)", "星空．幸福+蛋捲鐵盒(紅茶)", "星空．幸福+蛋捲鐵盒(抹茶)", "星空．幸福+蛋捲鐵盒(紅藜)",
  "星空．幸福+蛋捲鐵盒(小農)", "星空．幸福+蛋捲鐵盒(經典)", "蛋捲．家庭分享包", "核你同頻綠．中式漢餅", "自定義"
];

let products = [];
let deliveries = [];

function addProd() {
  products.push({ id: Date.now(), name: PRODUCT_LIST[0], customName: '', total: 0 });
  render();
}

function addDel() {
  deliveries.push({ id: Date.now(), name: '', date: '', address: '', items: {} });
  render();
}

function render() {
  // 1. 渲染品項表格
  const pBody = document.getElementById('prod-body');
  pBody.innerHTML = products.map(p => {
    const allocated = deliveries.reduce((sum, d) => sum + (d.items[p.id] || 0), 0);
    const isOk = allocated === p.total && p.total > 0;
    return `
      <tr>
        <td>
          <select onchange="updateP(${p.id},'name',this.value)" style="width:100%">
            ${PRODUCT_LIST.map(opt => `<option value="${opt}" ${p.name===opt?'selected':''}>${opt}</option>`).join('')}
          </select>
          ${p.name==='自定義' ? `<input type="text" placeholder="請輸入名稱" oninput="updateP(${p.id},'customName',this.value)" value="${p.customName}" style="margin-top:5px;">` : ''}
        </td>
        <td><input type="number" value="${p.total||''}" oninput="updateP(${p.id},'total',+this.value)" style="width:80px"></td>
        <td><span class="status-tag ${isOk?'status-ok':'status-err'}">${allocated} / ${p.total}</span></td>
        <td><button onclick="removeP(${p.id})" style="border:none;color:#ccc;background:none;cursor:pointer;">✕</button></td>
      </tr>
    `;
  }).join('');

  // 2. 渲染配送點卡片
  const dList = document.getElementById('delivery-list');
  dList.innerHTML = deliveries.map((d, idx) => `
    <div class="del-card">
      <div class="del-header">
        <span class="del-title">📍 配送點 ${idx+1}</span>
        <button onclick="removeD(${d.id})" style="color:var(--orange);border:none;background:none;cursor:pointer;font-size:12px;">移除此點</button>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
        <div class="field"><label>收件姓名 *</label><input type="text" oninput="updateD(${d.id},'name',this.value)" value="${d.name}"></div>
        <div class="field"><label>希望配送日期 *</label><input type="date" oninput="updateD(${d.id},'date',this.value)" value="${d.date}"></div>
      </div>
      <div class="field"><label>配送地址 *</label><input type="text" oninput="updateD(${d.id},'address',this.value)" value="${d.address}"></div>
      <div class="qty-alloc-box">
        <label style="font-size:12px;font-weight:bold;margin-bottom:10px;display:block;">分配此點的盒數：</label>
        ${products.map(p => {
          const pName = p.name==='自定義' ? (p.customName||'自定義') : p.name;
          return `
            <div class="qty-row">
              <span style="font-size:13px;color:var(--ink-mid);">${pName}</span>
              <input type="number" style="width:70px;padding:5px;" oninput="updateDI(${d.id},${p.id},+this.value)" value="${d.items[p.id]||''}">
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `).join('');
  updateSummary();
}

function updateP(id,f,v){ products.find(x=>x.id===id)[f]=v; render(); }
function removeP(id){ products = products.filter(x=>x.id!==id); render(); }
function updateD(id,f,v){ deliveries.find(x=>x.id===id)[f]=v; updateSummary(); }
function removeD(id){ deliveries = deliveries.filter(x=>x.id!==id); render(); }
function updateDI(did, pid, v) { deliveries.find(x=>x.id===did).items[pid] = v; updateSummary(); }

function updateSummary() {
  const total = products.reduce((s,p)=>s+p.total,0);
  let allocated = 0;
  deliveries.forEach(d => Object.values(d.items).forEach(v => allocated += (v||0)));
  const diff = total - allocated;

  const sDiv = document.getElementById('summary');
  sDiv.innerHTML = `
    <div>訂購總數: ${total}</div>
    <div>已分配: ${allocated}</div>
    <div style="color:${diff===0?'#fff':'#f66'}">待分配: ${diff}</div>
  `;

  const nameFilled = document.getElementById('cust-name').value.trim() !== '';
  const delAllFilled = deliveries.length > 0 && deliveries.every(d => d.name && d.address && d.date);
  const isComplete = (total > 0 && diff === 0 && nameFilled && delAllFilled);
  
  document.getElementById('btn-submit').disabled = !isComplete;
  document.getElementById('error-hint').style.display = isComplete ? 'none' : 'block';
}

async function submitForm() {
  document.getElementById('ov-loading').classList.add('show');
  const payload = {
    customerName: document.getElementById('cust-name').value,
    customerPhone: document.getElementById('cust-phone').value,
    note: document.getElementById('cust-note').value,
    products: products.map(p => ({ name: p.name==='自定義'?p.customName:p.name, total: p.total })),
    deliveries: deliveries.map(d => ({
      name: d.name, address: d.address, date: d.date,
      items: Object.keys(d.items).map(pid => ({
        productName: (products.find(p=>p.id==pid)?.name === '自定義' ? products.find(p=>p.id==pid)?.customName : products.find(p=>p.id==pid)?.name),
        qty: d.items[pid]
      })).filter(i => i.qty > 0)
    })),
    submittedAt: new Date().toLocaleString()
  };

  try {
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    document.getElementById('ov-loading').classList.remove('show');
    document.getElementById('ov-success').classList.add('show');
  } catch (e) {
    alert('網路連線失敗，請檢查後再試一次');
    document.getElementById('ov-loading').classList.remove('show');
  }
}

addProd();
</script>
</body>
</html>
