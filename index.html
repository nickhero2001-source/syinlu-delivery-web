<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>幸福+工場・配送調度系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f9f6f2; --card-bg: #ffffff; --primary: #2c2416; --accent: #c9a96e;
    --accent-dark: #a68a55; --text: #3d352a; --text-light: #7a6e5d; --border: #e3ddd3;
    --tag-green: #eef7f2; --tag-green-text: #2d8a54; --tag-red: #fef2f2; --tag-red-text: #d4622a;
  }
  
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 240px; }

  /* 極簡雅緻標頭 */
  .header { background: var(--primary); padding: 60px 20px; text-align: center; color: #fff; position: relative; }
  .header::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: var(--accent); }
  .header-label { font-family: 'Noto Serif TC', serif; font-size: 13px; letter-spacing: 5px; color: var(--accent); margin-bottom: 12px; display: block; }
  .header h1 { font-family: 'Noto Serif TC', serif; font-size: 32px; margin: 0; letter-spacing: 2px; }

  .wrapper { max-width: 800px; margin: 0 auto; padding: 0 15px; }

  /* 區塊標籤 */
  .section-title { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 700; color: var(--accent-dark); margin: 50px 0 20px; display: flex; align-items: center; gap: 15px; }
  .section-title i { font-style: normal; font-size: 14px; background: var(--accent); color: #fff; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

  /* 卡片基底 */
  .main-card { background: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 40px rgba(44,36,22,0.06); border: 1px solid var(--border); overflow: hidden; margin-bottom: 30px; }
  .card-padding { padding: 30px; }

  /* 總量設定區 */
  .total-control { background: #fdfbf8; border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-top: 15px; }
/* 修正產品列在手機上的排版 */
.prod-row { 
  display: flex; 
  flex-wrap: wrap; /* 允許折行 */
  align-items: center; 
  gap: 10px; 
  margin-bottom: 15px; 
  background: #fdfbf8;
  padding: 10px;
  border-radius: 12px;
}

/* 下拉選單在手機上佔據更多空間 */
.prod-row select { 
  flex: 1; 
  min-width: 180px; /* 確保產品名稱不被擠壓 */
}

/* 盒數輸入框與刪除按鈕 */
.prod-row .qty-field { 
  width: 90px !important; 
}

.prod-row .btn-del {
  padding: 10px;
}

/* 針對極窄手機的額外優化 */
@media (max-width: 400px) {
  .prod-row select { 
    flex-basis: 100%; /* 品項名稱自佔一行 */
  }
  .prod-row .qty-field {
    flex-grow: 1; /* 盒數變長一點方便點擊 */
  }
} { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
  
  /* 配送日期區塊 */
  .date-group { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border); margin-bottom: 40px; box-shadow: 0 15px 50px rgba(0,0,0,0.03); }
  .date-head { background: #fcfaf7; padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  
  /* 配送點位小卡 */
  .place-card { margin: 25px; padding: 25px; background: #fff; border: 1px solid var(--border); border-radius: 15px; position: relative; border-left: 6px solid var(--accent); }
  
  /* 表單元素 */
  .input-group { margin-bottom: 20px; }
  .input-group label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--text-light); }
  input, select { 
    width: 100%; padding: 14px 18px; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; transition: all 0.3s; color: var(--text);
  }
  input:focus, select:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 4px rgba(201,169,110,0.1); }
  
  .qty-field { width: 110px !important; text-align: center; font-weight: 700; color: var(--primary); border: 2px solid var(--accent) !important; font-size: 20px !important; }

  /* 按鈕美化 */
  .btn-ghost { background: transparent; border: 2px dashed var(--accent); color: var(--accent-dark); padding: 15px; width: 100%; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
  .btn-ghost:hover { background: #fdfaf5; border-style: solid; }
  .btn-del { color: var(--orange); border: none; background: none; font-weight: 700; cursor: pointer; font-size: 13px; }

  /* 底部固定欄 */
  .footer-summary { 
    background: var(--primary); padding: 25px 20px 40px; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; 
    border-top: 5px solid var(--accent); box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
  }
  .status-pills { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 25px; }
  .pill { padding: 6px 16px; border-radius: 50px; font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }
  .pill-wait { background: rgba(212,98,42,0.1); color: #ff9d76; border: 1px solid rgba(212,98,42,0.4); }
  .pill-ok { background: rgba(45,138,84,0.1); color: #57d48d; border: 1px solid rgba(45,138,84,0.4); }

  .btn-primary { 
    width: 100%; max-width: 480px; padding: 22px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); 
    color: #fff; border: none; border-radius: 100px; font-size: 19px; font-weight: 700; cursor: pointer; display: block; 
    margin: 0 auto; letter-spacing: 6px; box-shadow: 0 8px 20px rgba(166,138,85,0.4); 
  }
  .btn-primary:disabled { background: #555; color: #888; box-shadow: none; letter-spacing: 2px; }

  /* 網格系統 */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="header">
  <span class="header-label">SYIN-LU SOCIAL WELFARE FOUNDATION</span>
  <h1>幸福+工場<em>配送安排單</em></h1>
</header>

<div class="wrapper">
  <div class="section-title"><i>1</i> 訂單總量與訂購人</div>
  <div class="main-card">
    <div class="card-padding">
      <div class="grid-2">
        <div class="input-group"><label>訂購人姓名 *</label><input type="text" id="cust-name" oninput="updateSummary()"></div>
        <div class="input-group"><label>聯絡電話 *</label><input type="tel" id="cust-phone"></div>
      </div>
      
      <div class="total-control">
        <label style="font-weight:700; margin-bottom:15px; display:block; color:var(--primary);">第一步：請設定本次訂單的品項總盒數</label>
        <div id="main-prod-list"></div>
        <button class="btn-ghost" onclick="addMainProd()">＋ 新增訂購品項</button>
      </div>
    </div>
  </div>

  <div class="section-title"><i>2</i> 配送計畫規劃 (分日期/分地點)</div>
  <div id="date-group-container"></div>
  
  <button class="btn-ghost" style="background:var(--primary); color:var(--accent); border:none; padding:20px; font-size:17px; margin-bottom:60px;" onclick="addDateGroup()">
    ＋ 新增出貨日期 (例如：第一批、第二批...)
  </button>
</div>

<div class="footer-summary">
  <div class="status-pills" id="summary-pills"></div>
  <button class="btn-primary" id="btn-submit" onclick="submitForm()" disabled>請完成配送分配</button>
</div>

<div id="ov-loading" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; color:#fff; align-items:center; justify-content:center; flex-direction:column;">
  <div style="text-align:center;">
    <h2 style="font-family:'Noto Serif TC',serif; letter-spacing:4px;">正在同步安排單...</h2>
    <p style="opacity:0.6;">請稍候，資料正在傳送到後端系統</p>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycby6Qj3UxB2dB0FR8mbWidJ8tWD8XrmXIyPuwUM6TFLZnY-Q393PsdTeD4AiOQK_PoDs/exec';
const PRODUCT_LIST = ["星空不來梅．單層綜果款", "星空不來梅．雙層綜果款", "星空不來梅．單層吃茶款", "星空不來梅．雙層吃茶款", "美好時光．雙層綜合款(餅乾+鳳梨酥+長蛋2)", "美好時光．雙層綜合款(12長蛋餅鳳款)", "美好時光．單層餅乾蛋捲款", "美好時光．單層蛋捲款", "花獻．餅乾款", "花獻．餅乾蛋捲款", "小協奏禮盒．餅乾款", "小協奏禮盒．餅乾蛋捲款", "幸福花磚．綜合款雙層", "幸福花磚．餅乾款雙層", "幸福花磚．綜合款三層", "Happy Together．16支蛋捲餅乾款", "Happy Together．8支蛋捲綜合款", "Happy Together．8入土鳳梨酥", "一起幸福吧．麵包樹聯名", "美好夢想．A餅鳳款", "美好夢想．B綜合款", "美好夢想．C餅蛋款", "美好夢想S．餅乾蛋捲組", "Wonderful World．精采世界", "愛麗絲夢遊仙境．蛋捲組", "愛麗絲夢遊仙境．蛋捲餅乾組", "星空．幸福+蛋捲鐵盒(芝麻)", "星空．幸福+蛋捲鐵盒(咖啡)", "星空．幸福+蛋捲鐵盒(巧克力)", "星空．幸福+蛋捲鐵盒(原味)", "星空．幸福+蛋捲鐵盒(香蕉)", "星空．幸福+蛋捲鐵盒(紅茶)", "星空．幸福+蛋捲鐵盒(抹茶)", "星空．幸福+蛋捲鐵盒(紅藜)", "星空．幸福+蛋捲鐵盒(小農)", "星空．幸福+蛋捲鐵盒(經典)", "蛋捲．家庭分享包", "核你同頻綠．中式漢餅", "自定義"];

let mainProducts = [];
let dateGroups = [];

function addMainProd() {
  mainProducts.push({ id: Date.now(), name: PRODUCT_LIST[0], customName: '', totalQty: '' });
  render();
}

function updateMainProd(id, f, v) {
  let p = mainProducts.find(x => x.id === id);
  p[f] = v;
  if(f === 'name') render(); else updateSummary();
}

function addDateGroup() {
  const gId = Date.now();
  dateGroups.push({ id: gId, date: '', addresses: [{ id: gId+1, receiver: '', address: '', items: {} }] });
  render();
}

function updateDelDate(gId, val) {
  const d = new Date(val);
  if (d.getDay() === 0 || d.getDay() === 6) {
    alert("週六、日不配送，請選平日日期。");
    return;
  }
  dateGroups.find(g => g.id === gId).date = val;
  updateSummary();
}

function render() {
  // 總量清單
  const mList = document.getElementById('main-prod-list');
  mList.innerHTML = mainProducts.map(p => `
    <div class="prod-row">
      <select onchange="updateMainProd(${p.id},'name',this.value)">
        ${PRODUCT_LIST.map(opt => `<option value="${opt}" ${p.name===opt?'selected':''}>${opt}</option>`).join('')}
      </select>
      <div style="display:flex; align-items:center; gap:10px;">
        <input type="number" inputmode="numeric" class="qty-field" placeholder="數量" value="${p.totalQty}" oninput="updateMainProd(${p.id},'totalQty',this.value)">
        <button class="btn-del" onclick="mainProducts=mainProducts.filter(x=>x.id!==${p.id});render();">✕</button>
      </div>
      ${p.name==='自定義'?`<input type="text" placeholder="請輸入產品名稱" style="width:100%; margin-top:10px;" value="${p.customName}" oninput="updateMainProd(${p.id},'customName',this.value)">`:''}
    </div>
  `).join('');

  // 計畫區
  const gContainer = document.getElementById('date-group-container');
  gContainer.innerHTML = dateGroups.map(g => `
    <div class="date-group">
      <div class="date-head">
        <div style="display:flex; align-items:center; gap:15px;">
          <strong style="color:var(--primary)">預計出貨日</strong>
          <input type="date" value="${g.date}" onchange="updateDelDate(${g.id}, this.value)" style="width:170px; padding:10px;">
        </div>
        <button class="btn-del" onclick="dateGroups=dateGroups.filter(x=>x.id!==${g.id});render();">移除日期</button>
      </div>
      
      ${g.addresses.map((a, idx) => `
        <div class="place-card">
          <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <span style="font-weight:700; color:var(--accent-dark);">📍 配送地點 ${idx+1}</span>
            <button class="btn-del" onclick="removeAddr(${g.id}, ${a.id})">移除地址</button>
          </div>
          <div class="grid-2">
           <div class="input-group"><label>收件人姓名</label><input type="text" value="${a.receiver}" oninput="updateAddrVal(${g.id},${a.id},'receiver',this.value)"></div>
  
  <div class="input-group"><label>收件人電話</label><input type="tel" value="${a.receiverPhone || ''}" oninput="updateAddrVal(${g.id},${a.id},'receiverPhone',this.value)"></div>
  
  <div class="input-group" style="grid-column: span 2;"><label>完整收件地址</label><input type="text" value="${a.address}" oninput="updateAddrVal(${g.id},${a.id},'address',this.value)"></div>
</div>
          
          <div style="margin-top:10px; border-top:1px solid #f0efeb; padding-top:15px;">
            <p style="font-size:13px; font-weight:700; color:var(--text-light); margin-bottom:12px;">分配此地點的數量：</p>
            ${mainProducts.map(p => {
              const pLabel = p.name==='自定義' ? (p.customName||'自定義品項') : p.name;
              return `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; background:#fdfbf8; padding:10px; border-radius:8px;">
                  <span style="font-size:14px; font-weight:500;">${pLabel}</span>
                  <input type="number" inputmode="numeric" class="qty-field" style="height:40px; width:85px!important; font-size:17px!important;" 
                         placeholder="0" value="${a.items[p.id]||''}" oninput="updateItemQty(${g.id},${a.id},${p.id},this.value)">
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `).join('')}
      
      <div style="padding:0 25px 25px;">
        <button class="btn-ghost" onclick="addAddr(${g.id})">＋ 在此日期新增地址</button>
      </div>
    </div>
  `).join('');
  updateSummary();
}

function removeAddr(gId, aId) {
  const g = dateGroups.find(x => x.id === gId);
  g.addresses = g.addresses.filter(a => a.id !== aId);
  render();
}

function addAddr(gId) {
  dateGroups.find(g => g.id === gId).addresses.push({ id: Date.now(), receiver: '', address: '', items: {} });
  render();
}

function updateAddrVal(gId, aId, f, v) {
  dateGroups.find(g => g.id === gId).addresses.find(a => a.id === aId)[f] = v;
  updateSummary();
}

function updateItemQty(gId, aId, pId, v) {
  dateGroups.find(g => g.id === gId).addresses.find(a => a.id === aId).items[pId] = v;
  updateSummary();
}

function updateSummary() {
  const container = document.getElementById('summary-pills');
  let allMatched = true;
  let html = '';

  if(mainProducts.length === 0) allMatched = false;

  mainProducts.forEach(p => {
    const pLabel = p.name==='自定義' ? (p.customName||'未命名') : p.name;
    const target = Number(p.totalQty) || 0;
    let current = 0;
    
    dateGroups.forEach(g => {
      g.addresses.forEach(a => {
        current += (Number(a.items[p.id]) || 0);
      });
    });

    const isMatch = (target > 0 && target === current);
    if(!isMatch) allMatched = false;
    html += `<span class="pill ${isMatch?'pill-ok':'pill-wait'}">${pLabel}: ${current}/${target}</span>`;
  });

  container.innerHTML = html;

  const nameOk = document.getElementById('cust-name').value.trim() !== '';
  const delOk = dateGroups.length > 0 && dateGroups.every(g => g.date && g.addresses.every(a => a.receiver && a.address));
  
  const btn = document.getElementById('btn-submit');
  if(nameOk && delOk && allMatched) {
    btn.disabled = false;
    btn.innerText = "確認送出配送安排單";
  } else {
    btn.disabled = true;
    btn.innerText = "請完成所有分配 (盒數需吻合)";
  }
}

async function submitForm() {
  document.getElementById('ov-loading').style.display = 'flex';
  const payload = {
    customer: document.getElementById('cust-name').value,
    phone: document.getElementById('cust-phone').value,
    mainProducts: mainProducts.map(p => ({ name: p.name==='自定義'?p.customName:p.name, total: p.totalQty })),
    dateGroups: dateGroups.map(g => ({
      date: g.date,
      addresses: g.addresses.map(a => ({
        receiver: a.receiver,
        address: a.address,
        items: Object.keys(a.items).map(pid => {
          const p = mainProducts.find(x => x.id == pid);
          return { name: p.name==='自定義'?p.customName:p.name, qty: a.items[pid] };
        }).filter(i => i.qty > 0)
      }))
    }))
  };

  try {
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    document.getElementById('ov-loading').innerHTML = `
      <div style="background:#fff; padding:50px; border-radius:30px; text-align:center; color:var(--primary); box-shadow:0 20px 60px rgba(0,0,0,0.5);">
        <h1 style="font-family:'Noto Serif TC',serif; color:var(--accent-dark);">送出成功</h1>
        <p>安排單已送達，感謝您的填寫</p>
        <button onclick="location.reload()" style="margin-top:30px; padding:15px 50px; background:var(--primary); color:#fff; border:none; border-radius:50px; cursor:pointer;">返回首頁</button>
      </div>
    `;
  } catch(e) {
    alert("系統忙碌中，請稍後再試。");
    document.getElementById('ov-loading').style.display = 'none';
  }
}

// 初始化
addMainProd();
</script>
</body>
</html>
